body:
  text: 贈毛洋溟序余之友曰毛洋溟學古之道爲古之文吾樂而友之余之友曰吳仲倫學古之道爲古之文吾樂而友之洋溟爲人坦易通適其文跌宕尙奇氣仲倫行嚴整進退有法其爲文亦然二子者未嘗相過從余嘗以洋溟之文示仲倫仲倫弗之許以仲倫文示洋溟洋溟亦弗深許也然余聞仲倫言古之君子尊其道故其思約致其學故其辭文惟洋溟之言固若是洋溟論爲文以古人爲規矩始于法成于化仲倫亦嘗云爾夫二子者其學于道同學于古人之文同而至其爲文若乃大異何哉余嘗疑古之文人前後數千百年更相詆訾以是所見嘗以爲設使其竝生一時相與上下其議論未知其所爲是非者果有是非乎其無是非乎抑亦互相爲齗齗者乎然唐人爲文唯韓愈氏爲是其時若李元賓樊紹述之流于古人之文未爲得規矩也而韓氏之推之不啻其自許易曰天下同歸而殊塗一致而百慮則又疑以爲古之學于道而庶幾古人者雖有不同其必無互相爲是非者耶今二子者竝時而生又同州邑處余以未嘗一相見上下其論議也果其開口一論議則余之所疑于古人者其可釋耶抑二子者自有同焉者而其異者未足爲是非也余爲古文在洋溟後而同學于仲倫二子者之是非余無以識之也故序洋溟之文以訊仲倫送錢魯斯序魯斯長余二十四歲以嘗從先君子受經故余幼而兄事之魯斯以工作書爲詩名天下交友徧海內余年十六七歲時方治科舉業閒以其暇學魯斯爲書書不工又學魯斯爲詩詩又不工然魯斯嘗誨之越十餘年余學爲古辭賦乾隆戊申自歙州歸過魯斯而示之魯斯大喜顧而謂余吾嘗受古文法于桐城劉海峯先生顧未暇以爲子儻爲之乎余愧謝未能已而余游京師思魯斯言乃盡屏置曩時所習詩賦若書不爲而爲古文三年乃稍稍得之而余畱京師六年歸更太孺人之憂復游浙中轉入歙而魯斯客湖南北久乃歸參差不得見者十三年今年夏余自歙來杭州畱數月一日方與客語有覢然而來者則魯斯也其言曰吾見子古文與劉先生言合今天下爲文莫子若者子方役役于世未能還鄕里吾幸多暇念久不相見故來與子論古文魯期遂言曰吾曩于古人之書見其法而已今吾見拓于石者則如見其未刻時見其書也則如見其未書時夫意在筆先者非作意而臨筆也筆之所以入墨之所以出魏晉唐宋諸家之所以得失熟之于中而會之于心當其執筆也繇乎其若存攸攸乎其若行冥冥乎成成乎忽然遇之而不知所以然故曰意意者非法也而未始離乎法其養之也有源其岀之也有物故法有盡而意無窮吾于爲詩亦見其若是焉豈惟詩與書夫古文亦若是則已耳嗚呼魯斯之于古文豈曰法而已哉抑余之爲文何足以與此雖然其惓惓于余不遠千里而來吿之以道若惟恐其終廢焉者嗚呼又可感也于是畱數日將去送之于西湖書其言而誌之且以爲別與左仲甫書仲甫執事前者奉書適苦頭痛言辭草猝懷不能盡凡今天下之患在事至而無人任之無人任之者非無人爲之也爲之而不足以勝之也凡爲其事者未有不欲人之任之也非其人而任之事非以此人爲果足以勝之也知其不足以勝之而無勝之者之可以代之故不得已而聽其事之不勝也夫用人之道若良賈之息物然陸而資舟水而資車故時用物而不匱事之至也而求勝之焉者此其所以無人也識足以察之權足以致之是之謂豫事凡今之有其權者皆不足以言此者也或可與之言則又不足以察此者也州縣官之于權可謂微矣雖然事之至而所欲求者其與有其權者有以異乎無以異也仲甫之于此有其責矣其亦知之矣而識又足以察之然則有其權者不足與言可與言者非仲甫而誰哉仲甫之官不足以奔走天下之士仲甫之財不足以延攬天下之士然而望之于仲甫者以仲甫之自有可用之權也知縣者民之父母也未有一家之人曠不相接而可以爲父母者也未有子孫之才智僕隸之技力漫不相悉而可以爲父母者也昔者宓子宰單父有兄事者有父事者有師事者今之縣與古之邑大小殊矣民人戶口不啻十倍而曰無其人者儻不然歟今仲甫之于所治搢紳之士草野之族下及吏胥之役亦嘗得其可任者歟其有之則吾于仲甫無以復言也如其求之而未得也其未嘗求之也則仲甫之責方今之務未有要于此者也夫鴻毛雖眾不若一翮諾諾盈側不當一士仲甫左右儻有周舍其人者乎其未有也其未嘗求也則仲甫雖盡相識者而泛愛之人人有得于仲甫其無益于仲甫之事可知也方今人才誠不易得仲甫氣夷而見遠當有以辨之大要不汲汲于世俗而近于迂誕者乃爲才耳朋儕中如丁道久者庶幾可以成就惜其奔走衣食恐遂役於塵俗不然則亦可任之一人也惠言于天下事無一能曉不量其愚鄙輒欲以狂言聞于執事執事其亦察之幸甚不宣答莊卿珊書卿珊足下得四月二十日書忻悚以愧僕不肖幼不知學長而漫游行不足以自立文不足以自通過辱推許誠非任受挹損之義自恆以上所不敢承況惠言之譾譾者耶然吾子名家子學有源別質直不妄固知非苟爲奬借而已蓋其有所篤好深嗜嗛嗛若不及中誠發于天性推而達之而不自知其所施之非人僕豈惟媿吾子之推許已哉抑重媿吾子取道之勤勤爲所不及也自僕往京師鄕里之賢士聞其名者多矣嘗恨不及知而友之其或見之而無恨于不知者乃亦多有三歲以來略得相識然困于憂患心惛然不暇曉又奔走衣食汲汲靡底其慕而友之者卒歲不過三四見又嘗自恨友之而不足知之與向之不得友之也無有異去歲遊南陵與道久居三十日自以爲知之其聰敏特達志氣激發昭昭然在三代之上庶幾聖人之所爲進取者僕旣得其爲人稠人廣眾之中率語之以自壯吾子在諸君子之中内重而外厚最可一望而識又學于道久議論性術一宗于師僕之于知吾子也自以爲差易而又堅之以道久則吾之信于吾子者其亦有以得之矣自古非才之難成之實難其于今尤甚何者貧窮迫其中而誹譽敗其外也然天下之事無藉爲之則已爲之有異于古乎哉幸而不爲其事則已爲之不必于古之人之爲之乎哉才之天也成之人也在天者道久之與卿珊皆是矣在人者道久之與卿珊之志皆是矣二子者之成豈不謂難哉然吾謂二子者有其志則眾人之所難者不足以難之而二子者之不負乎其志抑爲難也僕材駑而精苶終以無所造就庶幾朋友之中多見有其人者而吾之求之亦未始屢得抑鄕里之士僕所未知者猶多卿珊必知之其儻爲我言吾得徧友之足矣遷改格序前錄去計己得見文辭雖不足道其亦可爲一簣之助耳舍弟方銳意爲學而迫于所難者憂恐猝猝未知所成就何如耳方暑自愛不宣鄂不草堂圖記巖鎭市之南舊有園曰先春地平衍小不能三畮臺榭之飾甚儉池石花樹獨奇其外平疇長林帶以崇山雲物之態四望交集巖鎭之爲園者莫及焉乾隆乙巳余客巖鎭時園荒無人嘗以歲除之日與桐城王悔生披籬而入對語竟日是時朔風怒號樹木呌嘯敗葉荒草堆積庭下時有行客闚門而視相與怪駭不知吾兩人爲何如人也壁間有舊題則金君文舫及其兄筠莊季星巖聯句詩蓋五六年前游詠之盛猶可想見而其時筠莊官京師文舫星巖侍觀察公于吾郡皆不得相見讀其詩俯仰今昔又爲之慷慨明年余與悔生皆去巖鎭又十年余復來則園已爲文舫所有益治其傾圯位置其樹石增以迤廊曲房高樓修除山若聳而高水若瀏而深花木魚鳥皆若相得而欣旣乃易其名曰鄂不草堂誌昔游也于是筠莊宦河東文舫則與星巖昕夕歌嘯其中燕飮屬客余時時在坐而是歲十月王晦生適至信宿草堂乃去當君兄弟昔日詠觴之時豈意十五六年之後來爲斯園主人而余與悔生十年之間南北奔走適草堂之成而復得相遇于此人生盛衰聚散大都如此非偶然也于是黃君純矣畫草堂圖乃記其後云園于程氏當明之某年草堂于金氏爲嘉慶元年編竹爲籬方若干步堂居東偏西嚮前有桂樹四堂之左曲廊迤以北水閣在其北少西南嚮其下池怪石環其池池中爲梁梁西有梧桐高三十尺古藤繚之盡其末末下垂復土爲本相去六尺樓在池西方二丈四達囱曲池環之若矩夫蕖盈焉其岸多老梅石如人立曲池之西又樓之東嚮道夫蕖上屬于方樓北降爲曲房爲齋爲庖湢以東屬于水閣曲池之南爲畦春種芍藥秋種菊畦東亭亭北値水閣牡丹在亭東其東紅豆樹高四十尺三歲一實北直乎堂文舫名應璸内閣中書不榮其官退而樂兄弟之樂君子以爲賢江氏墓圖記相墓之法由來遠矣班孟堅曰形法者大舉九州地域以立城郭宮室審其吉凶譬律有長短而徵其聲非有鬼神其數然也然氣與形相爲首尾有有其氣而無其形亦有有其形而無其氣則精微之獨異者焉以其說不見於六經傳其學者皆技術之士言不能雅馴學士䍐道之是以靡所折中而迂怪荒亂之言縱矣自宋以前地理家書著錄者七百餘卷今其存者不百一而元明以來僞妄之書徧天下異學之禍非獨儒術然也傳曰占水之法以勢爲難而形次之方又次之勢來形止謂之全氣夫氣之行乎地也無乎不之也雖然有散有聚有發有斂有和有乖有湻有駁是之謂八成夫氣者呴也呴必有所積積必有所起起必有所分分必有所會是故欲其來來也者會之徵也來也者無不往也有所冓而畜有所畜而凝來者畜則往者亦來是故欲其止止也者凝之徵也雖然懼其氣之乖也故陰陽以沖之逆順以儷之死生以物之猶懼其駁也故經之以十二兩之以八參之以二十四緯之以四十八有向有背有右有左故曰方方也者受其來動其止也是之謂三乘世之謂術者則不然論勢則蔽於五行而不窮其分變論形則眩於四勢而不察其頓息論方則舛於星卦而不原其條理紛紜囘互百變萬出而各自以爲神嗚呼楊曾不作其誰與正之矣葬者藏也藏也者所以安親之體魄也以親之體魄邀其利也者君子謂之逆雖然體魄之安于其地也吾不得而知也其禍于其子孫者其體魄不安焉吾見之矣故葬者以禍福爲之徵君子不欲言顧有所弗廢也吾友江君少好學無所不窺以其先世之有未葬也乃精求地理之學古今之書悉通之考之以目驗決其是非若白在黑爲之十餘年乃始卜地以葬其祖及曾祖其族人紹蓮爲圖其地形而藏於家欲子孫之世有考也後十有八年余來新安始識君時時質君以地理以君之論證之于書皆可信旣觀君之葬有合于古者三焉一曰不趨正勢故審氣特二曰不貪貴脈故乘氣親三曰不逐水向故用氣純信乎哉其有以寕其親也乃記其圖曰乾隆四十三年十一月辛丑歙江毓英葬其曾祖考朝議大夫霖公府君於所居北邨筲箕塢之原以其曾祖妣徐恭人及其祖考朝議大夫虞在府君祖妣方恭人祔山祖于瑞金別于雞冠降于馬墳于法龍巨門穴左輔水貪狼來脈艮入氣甲葬乘甲向在申左加坤封之崇四尺圜十六尺碑於後向亦申右加庚就用水爲癸局具如圖嘉慶三年十二月八日武進張惠言書周維城傳嘉慶元年余游富陽知縣惲侯請余脩縣志未及屬稾而惲侯奉調余去富陽富陽高傅占君子人也爲余言周維城事甚具故爲之傳以遺後之脩志者周豐字維城其先紹興人徙杭州世爲賈有貲父曰重章火災蕩其家流寓富陽重章富家子驟貧抑鬱無聊益跅弛不問生產遂大困尋死富陽豐爲兒時當天寒父中夜自外歸又無所得食輒引父足懷中以臥十餘歲父旣卒學賈晨有老人過肆與之語奇之立許字以女女李氏也豐事母起坐行步嘗先得其所欲飮食必親視然後進事雖劇必時時至母所視問輒去去少頃卽又至母不覺其煩李氏女又能順之母脫有不當意或端坐不語豐大懼皇皇然若無所容繞䣛盤旋呼阿母不已聲悲慕如嬰兒視母顔色怡乃大喜又久之然後退其子孫逮見者言其寢將寐必呼阿母將寤又如之殆不自覺也豐年四十二時未有子病幾死過吳山有相者睨之良久引其手指之曰是文如丹砂公殆有隱德當有子富夀康寕自今始矣豐賈致富有子三人孫六人子濂沅孫愷恆皆補學官弟子豐年八十四卒如相者言豐於鄕里能行其德有長者行嘗有與同賈者歸豐旣資之已而或檢其裝有豐肆中物以吿豐豐急令如故誡勿言其來待之如初高傅占言曰富陽人多稱豐能施與好義然豐嘗曰吾愧吳翁焦翁吳翁者徽州人賈于富陽每歲盡夜懷金走里巷見貧家嘿置其戶中不使知也焦翁者江寕人挾三百金之富陽賈時江水暴發焦急呼漁者拯一人者與一金凡數日得若干人畱肆中飮食之俟水息貲遣之歸三百金立罄二人者今以問富陽人不能知也豐又嘗言吾生平感婦翁知我嗚呼市巷中固不乏士哉濟南知府莊君傳莊君鈞字振和自號曰斆坡先世自鎭江之金壇徙武進明宏治中有襗者中進士官山東參政其後子孫多顯武進之言世族者推莊氏以至君十世矣君少育於外王父劉文恪公于義乾隆初劉公奉節巡修畿輔河道君年十九隨幕府數爲劉公言水利事劉公甚奇之當是時直隸總督高公某方舉能任河工者曰孰有才如莊某而不早試之吏者乎卽上其名補霸州洲判卓異升東安縣知縣磁州知州以與按察使有親例改河南禹州升直隸汝州尋升陜西漢中府知府畱河南改南陽仍調直隸大名府丁父艱服除授山東濟南府護理濟東道按察使印卒於官君旣以高公舉任河工而以後督方公觀承卓異薦其畱河南也以巡撫阿思哈公奏而直隸總督周公元理請之故又調直隸君旣明習水利事又長于治民所在大府爭欲任君以事其厯州郡皆有殊績而君性謙謹未嘗自言及君之殁而其子幼無以知君之詳獨得其卓卓稱誦于人人者四事其一事曰磁州二漳水合于其西夏秋之閒水潦至決溢四漫或數百里無陸虛瀕河之吏歲賦帑築隄而捍之潰又増焉以爲常君至州議曰水方悍而撓之以隄是搏之也請穿河引之勢必殺總督方公然之疏于朝報可如君所欲穿者漳患大息其二事曰漳之瀕有棄地數千頃故民田也爲水敗獨其賦存吏以𫾣朴責之君請總督以聞盡蠲之民祠君于漳水上其三事曰汝州舊有衞衞有四屯衛之罷也幷于州而諸屯距州二三百里遠徭役以爲病君爲州皆貰免屯之民立石誦焉其四事曰君始爲大名府歲大旱君謁守道請發粟賑道曰太守擅之乎咎誰執君曰府去省千里文移往返必旬月饑民旦暮且死何咎之云乎知府請任立檄大名元城出穀四萬石與民旣總督周公奏之有旨復與賑穀四萬石民無餓者是秋歲大稔張惠言曰君之子軫與予交軫言君在東安時河水暴至君乘小舟渡及中流舟覆僕役皆溺有躍而呼者曰此吾賢父母也遽入水負之岀及其去大名民號哭而走送者百里不絕余以爲世多言今之民情不如古觀于君豈其然哉惜乎君之未得盡其所設施而其事又不得而盡傳之也余嘗游大名大名之人至今能道君之賑民粟也封文林郞惲君墓誌銘惲本楊氏漢平通侯惲其子違難以父名爲氏是曰貞道爲梁相後遷于毗陵之黃山而葬焉子孫世爲毗陵人君之支祖曰巍明湖廣按察司副使卒亦葬黃山君祖曰燮臣父曰士璜由君至副使幾世由副使至梁相幾世武進當吳越之要屢有兵燹故其望族不及宋以上唯惲氏自漢子孫不他徙能識其祖之居葬至于今不婚楊氏君之所居曰石橋去黄山十里自祖考皆不仕君以經授鄕里教其三子爲人好善而嫉惡持之甚嚴辨取予甚力不取虛美不逐世法獨行己志而已患溼疾以嘉慶元年月日卒年六十有三其明年某月日葬于其祖考之兆南在所居之北西三里君之子敬甞試禮部不第君時已病敬請歸省輒弗許其意欲以成其子之名以信其志也已而以教習官學生得官當選爲知縣固非所欲請于君君命就選其意又欲以所欲爲者屬之子以施之民也敬爲吏廉奉祿不足以豐養君以疾困未能之所治見其政成而君于是死矣余與敬交最久今年春卜葬吾母先時請於敬以銘墓之文敬許之矣未及爲而遭君憂嗚呼吾母不得敬之銘而乃使余銘君之葬也其可感也夫君諱輪字印槐配鄭氏考曰縣學生賓石今舉人環其兄也内德盛茂事君疾備至而不衰子三人長曰敬江甯鄕試舉人由浙江富陽縣知縣調江山縣以覃恩封君文林郎配孺人貤贈君之考如君妣錢如配鄭氏次斆次敷順天鄕試舉人女一適鄒氏孫二銘曰是唯君子之親翳此幽德兮曜其後人千秋萬世兮無或湮楊君茹征墓誌銘嘉慶三年七月三日陽湖楊君茹征卒其子嵎谷之友王曰旦以書訃張惠言於杭州且曰以君之好文章詞人學士之交於嵎谷者無不愛且禮也而於吾子及莊宇逵畢訓咸三人者殆無日去諸口今其不幸而卒子可無以銘其藏又曰君之行在門内父子昆弟諄至湻篤而無奇異可喜之事君之義在取予交接矜分循節而無任氣矯俗之舉君之風槪在鄕里朋友敬信愛樂而不得施尺寸之用以見于世懼遂無述于後使潛德晦昧則後進者之恥也又曰方君病且革夢寐或囈言數日忽猛省誦詩曰有倫有脊自是神定如平常及將屬纊嵎谷泣吿曰大人行矣其擇高明光大之路而蹈之君已不能言頷之遂卒嗚呼觀君生死之際所以自持及父子之所以相勖者其生平之所養豈苟焉而已哉張惠言曰古者取士以德行故士爲善于國不若爲善于家後世一以科舉試無用之文詞非是者擯不得仕進士之有以自見者豈不鮮哉而世之論人者必求其奇行高節繩墨之士則略弗稱道爲德者無以勸而俗以益媮其不以此歟如君者道足以治其行而無其位學足以淑其德而無其文惠足以博其施而無其財若乃矯異絕特之事以取傳道非君之所存也然則予之銘之也其容已乎君諱彙吉字茹征卒年七十一以某年月日葬于某原祖諱某考諱某妣某氏娶于某生子二人長卽嵎谷賢有文爲士宗師以廩膳生貢于學次曰某孫若干人曰某某近勇補學官弟子君爲人長疏晳有容音響淸越論議侃侃晩多病竟日對客莊坐猶無倦色君毎以不學爲憾前年春惠言將之歙謁君別君命嵎谷館之夜分與嵎谷論易君在別室聽久更來相與譚名理多獲以是知君之未嘗不學也銘曰氣剛以嚴又直以介何德之方惠于交友敬以終始何道之常有所不取靡所不予何施之光自厥門内亦曁宗黨御乎州鄕自我罔怍自彼罔怨何行之臧猗乎君歟而棄於不文而恧於不文歟我銘其幽以誶君子後其尙有聞歟恭城知縣陸君祠版文廣西恭城知縣陸君諱廣霖字用賓旣卒之十七年其子繼輅以書請于張惠言曰先人之葬也内閣中書趙君懷玉旣銘其墓然吾子今之有道德能文章者以繼輅之獲與游而不能得一言以傳其先人人且疑先人之有遺行而吾子弗之許也敢以爲請邑有吏如吾先人而傳之俾有述抑亦吾子之責惠言媿謝非其人不獲則條具其行事可論者以爲版文俾著之廟將俟表君之墓者刻焉其辭曰君中乾隆三年順天鄕試舉人四年會試進士是時福建知縣缺大吏以請天子重其人特用新進士選補而君得連城進士之有卽用知縣自君始君由連城知縣厯寕化順昌彰化而順昌再任最後爲恭城縣署百色同知君爲知縣屢以公事失官凡三失官輒復以知縣用嘗保舉知府終不得遷卒以知縣爲同官牽連罷職焉君爲知縣二十餘年所治閩粤之間或在海中林箐谿峪夷民蠻獠盜賊厠處不可施以政地曠以隔俗懭悍睚眦語言挺刃矢相鬬結連黨羣千百爲輩吏相顧不敢問則縱弛羈縻冀且無事及其不可隱則嚴治以法痛芟艾之君以威惠爲治善摘伏鉤距中民之情偏言單辭應手立斷姦民巨豪先知其主名窟穴所在張關發機壞其萌芽姦不得發寕化豪劉席玉其黨數百人號鐵尺爲鄕里害君始至行縣召之至及其黨皆至遽執之眾大驚不知所爲皆首服論十四人如法盜邱氏者居下泉里聚黨自衞積十餘年吏莫敢捕君致其族之爲諸生者喻之曰家有巨猾不能擒罪將及汝眾曰諾旬餘盜皆得而盜賊聞君之威亦不敢匿名捕之無不獲者嘗遣吏有所執取吏難之君曰不得吾親往至則己自械而待蓋其嚴如此然君實以平恕服之非以武猛爲務連城民有侮其族之貧者出其主于祠貧者怒火其祠遂相劫殺吏當之死君至致其族人于庭諭以情涕泣交下眾皆泣大感悔乃出火祠者于獄而反其主和如初臺灣多漳泉兩郡人素不悅往往持兵鬬因肆劫君之在彰化以事他出泉人乘君之不在也攻漳人于市眾大駭君聞馳歸親諭之咸解兵叩頭君予之杖其自彰化調順昌也守道以彰化多鴨寮曩時伺鴨者朱一桂以臺灣畔懲之謂君必禁斷乃去君曰此民業可禁耶審其籍令鄰里保任之君之寛厚喜全活人皆此類故終君所任無劇盜兵鬬者舊獄無不決君所不直退無怨言謗辭君在閩嘗爲巡撫陳文恭公陳十二事曰崇貢院通水利整橋梁裕積貯廣郵亭興煤厰端士習嚴械鬬禁囤積廢闖神戒溺女止燒山陳公以爲善多見施行其治縣亦皆用此蓋君明習吏事知大體本末明足以決之强足以勝之而屢起屢躓終不越縣令又以廢退卒故人多惜焉君以善治獄聞其事見于趙君之誌甚具故采其大者而論之君之卒以乾隆四十五年月日年七十五以乾隆五十三年月日葬于孝仁鄕方基邨夫人高氏莊氏祔子五人繼輅最小賢而有文孫耀遹亦與余善系曰君之宗自福始祖廷煒父載起世有緒以至君顯其德施於民胡起之胡躓之胡有才而巳斯君有子亦作宰門未昌其有待君之季維其賢亦有孫世作程澤之羕于是存有不信訊此文先府君行實先府君諱蟾賓字步靑號雲墀姓張氏其先自宋初由滁遷常州常州之張多由滁譜牒廢世不可紀其後曰端當明宏治中居南門德安里是爲大南門張氏張氏非大南門不共譜端孫欽欽生洲洲生宏道萬厯中舉於鄕官開封府通判生典典生以鼎以鼎生銘傴銘傴生采采生金第娶于白生府君自典至金第皆補郡縣學生有文章名世以敎授爲事而銘傴當明之亡獨不爲制舉業云府君生九歲而孤有兄曰思楷弟曰瑞斗家貧日不得再食奉白孺人敎兄弟相厲以儒學補府學生試高等廩膳常敎授鄕里閒其後游沅州一歲得疾歸遂卒年三十有八府君旣不得志干世無所表見又不獲永其年充所學以致不朽所論著皆未就其卒時惠言方四歲翊遺腹四月而生凡其言行可紀者弗得聞聞之于人所傳又弗敢審而府君之執友湯先生賓輅鄭先生夢楊篤行君子也知府君深守道德不毁譽故著其言以爲府君行實焉湯先生曰君好學深思不事穿鑿善爲詩及制舉文操紙筆立就性沈摰寡欲少言尤不喜說人過與人交不設城府久而能敬鄭先生曰薛心筠董仲客湯賓輅君兄弟總角交也賓輅抗希古人好考核故事不輕出門戶君兄弟與仲容則常集于薛氏予亦時時在坐雍容出論議率常連日夜君色温而恭言簡而中余心敬賓輅而酷愛君謂兩人于入道近也篤于孝友平生未嘗與人迕人亦未嘗迕君或問之曰天壤閒何處可使性氣其爲人如此鄭先生又言府君有異表中夜目光閃閃或一二尺許嘗自言秋夜偶翫月見河漢閒雲鱗鱗士女數十人雲裳霞佩執諸樂器飄飄過太虛膚髮纖悉可辨云湯先生名修業鄭先生名環皆常州武進人先祖妣事略先祖妣白孺人年二十二歸我先祖考政諴府君生子三人女二人政諴府君倜儻好學通六藝諸子之書天文術數劎騎之說家貧屢困童子試父文復府君命北游占天津商籍鄕試順天俄得疾卒京師年三十五是歲雍正十一年也訃至孺人慟絕是時文復府君年七十一呼曰天乎兒與婦偕亡乎頃之孺人蘇文復府君曰我老矣諸孤幼新婦死耶孺人泣謝曰不敢明年文復府君病及革顧孺人泣曰吾死矣諸孤與新婦爲命新婦存一日諸孤亦存一日也良久唏噓曰貧甚無可倚者吾死新婦存耶孺人泣對曰新婦生死與諸孤俱文復府君遂卒是時孺人三子曰思楷年十一歲曰蟾賓九歲曰瑞斗六歲兩女少長年十二三嵗孺人率二女紡織以爲食而課三子讀書口授四子毛詩爲之講解有疑義取筆記俟伯叔父至者就質焉或謂孺人家至貧令兒習他業可以餬口今使之讀讀未成餓死矣孺人曰自吾翁而上五世爲文儒吾夫繼之至吾子而澤斬吾不可以見吾翁卒命之學文復府君有弟曰衍黃老矣敎授於家憐諸孫恆誨之嘗語孺人曰而子可敎吾欲嚴督之念其枵腹不忍也孺人謝曰翁幸督之枵腹何病焉及孺人所以敎言行岀入罔閒三子皆以文行有聲自文復府君卒後十數年日常不得再食冬衣無袽夏無帳食以糠覈爲粥唯歲時及家忌日乃具蔬食以祭孺人曰雖不成禮不敢闕也戚族中有周恤之者一泉一粟皆簿記之曰他日不可不報而政諴府君之卒於都也内閣中書許公宏聲爲經紀其喪文復府君之終事則衍黃辦之孺人尤感焉曰吾子孫勿忘此大德孺人後政諴府君二十六年以乾隆二十四年二月二十日卒年六十有四考諱琪武進學生母吳太孺人政諴府君諱金第天津府學生文復府君諱采武進縣學生孺人之在室也吳太孺人病孺人刲股肉和藥以進病輒愈及文復府君疾革孺人復刲股以進焉及其卒也子瑞斗亦爲之刲股孺人喜釋氏書晚乃蔬食曰此亦安心一法至於僧尼寺觀母許往來以爲家敎孺人子思楷縣學生蟾賓府學廩膳生惠言之父也女壻曰趙體元邵規方孫三人曰富言惠言翊孫女三人壻曰董達章丁某許某曾孫五人孺人卒之五年子蟾賓亦卒其明年思楷及瑞斗奉孺人之柩合葬于加冠橋政諴府君之兆知縣黃公瑞鵬表之曰純孝苦節嘉慶年月日孫惠言謹述先妣事略先妣姓姜氏考諱本維武進縣學增廣生其先世居鎭江丹陽之滕邨遷武進者四世矣先妣年十九歸我府君十年凡生兩男兩女殤其二唯姊觀書及惠言在而府君卒卒後四月遺腹生翊是時先妣年二十九姊八歲惠言四歲矣府君少孤兄弟三人資敎授以養先祖母先祖母卒各異財世父別賃屋居城中府君旣卒家無一夕儲世父曰吾弟不幸以沒兩兒未成立是我責也然世父亦貧省嗇口食常以歲時減分錢米而先妣與姊作女工以給焉惠言年九歲世父命就城中與兄學逾月時乃一歸省一日暮歸無以爲夕飱各不食而寢遲明惠言餓不能起先妣曰兒不慣餓憊耶吾與而姊而弟時時如此也惠言泣先妣亦泣時有從姊乞一錢買糕啗惠言比日昳乃貰貸得米爲粥而食惠言依世父居讀書四年反先妣命授翊書先妣與姊課鍼黹常數綫爲節毎晨起盡三十綫然後作炊夜則然一燈先妣與姊相對坐惠言兄弟持書倚其側鍼聲與讀聲相和也漏四下惠言姊弟各寢先妣乃就寢然先妣雖不給於食惠言等衣履未嘗不完三黨親戚吉凶遣問之禮未嘗闕鄰里之窮乏來吿者未嘗不佽卹也先是先祖早卒先祖妣白太孺人恃紡績以撫府君兄弟至于成人敎之以禮法孝弟甚備里黨稱之以爲賢及先妣之艱難困苦一如白太孺人時所以敎惠言等者人以爲與白太孺人無不合也先妣逮事白太孺人五年嘗得白太孺人歡于先後委宛備至于人無所忤又善敎誨人與之居者皆悅而化姊適同邑董氏其姑錢太君與先妣尤相得虛其室假先妣居先妣由是徙居城中每歲時過故居里中諸母爭要請致殷勤唯恐速去及先妣卒內外長幼無不失聲及姻親之臧獲皆爲流涕先妣以乾隆五十九年十月十八日卒年五十有九以嘉慶二年正月十二日權葬于小東門橋之祖塋俟卜地而窆焉府君姓張氏諱蟾賓字步靑常州府學廩膳生世居城南郊德安里惠言乾隆丙午科舉人翊武進縣學生爲叔父後觀書之壻曰董達章國子監生嗚呼先妣自府君卒三十年更困苦慘酷其可言者止此什伯于此者不可得而言也嘗憶惠言五歲時先妣日夜哭泣數十日忽蒙被晝臥惠言戲牀下以爲母倦哭而寢也須臾族母至乃知引帶自經幸而得蘇而先妣疾惠言在京師聞狀馳歸已不及五十一日嗚呼天降罰于惠言獨使之無父無母也耶而于先妣何其酷也茗柯文二編卷下終
