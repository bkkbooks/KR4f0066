body:
  text: 游黃山賦黄山者靈圉之閒館有方之鬰林夫其奇瓌詭麗超絕列嶽葢􅁚崑崙閬風方丈蓬萊又其幽扃宮別杳冥卉旭凝霜仍雪閟自太始舉世䍑能登陟是以容成宅其陽浮邱棲其顚軒皇練其鼎玉女流其圅鸞鶴翔其林芝英挺其阜予與桐城王灼濱麓客遊兹􅀖因往探焉故復麤覽誕略未遂冥尋然于高則窮蓮花之崇于奇則盡雲海之怪亦足以極兹山之絕觀方俟永解纓絡結廬神隩故聊託篇翰以誌勝懷左思曰登高能賦者頌其所見也其所未覩葢闕如也迫區中之隘陋兮藐寥霩而神攄行周覽乎八極兮騎騂騩以踟蹰崑崙荒忽莫可搖集兮奄息汜濫舒節乎三天子之都朝吾濟夫容溪兮覜容成之高臺鬰巖巖之峗􅕲兮拂穹窿而上囘連岑吁其坱圠兮徑曼羡以延屬經崇駊騀以撇天兮㦄陁罷陀以頽谷霞嬰雲汨般以澹蕩兮嵸嵱紆潏紛以相逐時固未臻乎黄山也忽丹嶂之岑嶙兮頫羣峭以霞起浮纖削而荂敷兮勢振颺而不已心炯炯而上假兮自眇眇而無倚何風引而歘去兮慶不可乎彌揆夕信㝛于招提兮浴神濫之湯湯陰火􆃽薄于巖幽兮伯僑無忌奔以囘皇疏煩想于游蒙兮霍然飆除霅然雲揚乘凌兢而絕太陰兮與眞縡乎相將橫窈窕以互折兮俠飛泉以高趨聞幻景之恍惚兮有空相之僊廬旋室䆗窱以㛹娟兮柍桭黶翳而相扶應眞卓錫以遙佇兮狀顤顟而睢盱羌尋眴而無見兮悵天閟之不我舒厲磊砢而百轉兮穿崱屴以上征雲䬠䬠而襲予兮石氣黮黕而愈淸岑嵓雜遝以差錯兮􅓘蓯隱倚追以縱橫堂防絕限崛以艐路兮愕眙怵㚟梁以搶攘入鬼室之懿濞幽杳兮出雲窟之窐寥窈冥搏谽谺之膠盩枝梧兮尋光景之晻瞹鏗瞑稍定氣而囘眺兮矗天都之巍巍下嶙峋而刻削兮上洪紛而錯崔嶤翹撇烈孤以獨舉兮屬重陽而下迤形精濭遠若不知其所柢兮盪空靑而無依縝澤絡繹交以騰湊兮龍鱗霞駮煒以林離天扉石室儼以高隮兮亢烏騰乎將吾止之獨撟首而不可卽兮心徊徊而不怡仰穿溟滓兮上出彷徨傾臺兀兀兮俛視崢嶸震慄徙倚兮一升極目天表兮洋洋蓮華􅞉萼以右起兮翼天都而雙標爭奇角詭兀不相讓兮㟎􅟬嵬崴据以天橋紅采翠氣交曳而竝颺兮蒙合欱歘半㪚以招摇披桃花而屬夫容兮前雲門而摡逍遙往往高松􅀒石以成質兮壁走樛枝以還會東西蜿蜒徙靡而卻負兮蛟螭􅝦蟉相詭而異態沐疏仡之霜雪兮靧禪通之沆瀣猿狖仰眴而不能搴兮離朱目􅅭而不能紀流視羣崪靡何纍纍高低混茫襞積參差鬱撓天地茫茫霏霏似驚潮之鴻涌于海門兮如嵦垤之􅃁列于庭階也于是眽奇􅃟崇望蓮華之顚而造焉降巑岏而陟􅈏刖兮囘兀㟺而踐巀齾風磴運裛以窏洝兮石齒盱駴以碭突逡巡二分以側足兮下視嶔巖庨窌以罔沕噤吟跮踱僅乃得度兮自􅅭轉而􅩛忽詘轄折技熊經以卻立兮浸淫啞呀攀以中必雖荆忌之僄佼疾迅兮猶􅅒􅮇而氣失爾乃石扇頵砡兮掩杳玲瓏曾宇覆􅠈兮宛潬交通參差蔽虧兮壹陰壹陽枝橕刻削兮神樞而鬼工淹囘旋而詰屈兮邈乾坤其若蒙歘䂄涌而上出排閶闔之蕩蕩軼遊氛于鴻濛淩虛無而獨立兮貫到影而高厲倚瑤光而部眾神兮捎豐隆而抶屏翳馮蔑蒙而下矚兮汨修㯐于一氣峍屼鑽列琑碎而不可詰兮宕冥冥其容裔攬九海而撫八紘兮吾乃今日窺天地之所際朅吾下夫崔巍兮降雲梯之逶迤絫折以規轉兮阬隤稽而若顚得底平而岀天壁兮乃馮􅃁而極巓圍羣象于寸眸兮駢衍振陳宮以巉顔􅠡䓿􅣿之卅六兮竚元君于雲閒卻睨巨壑兮嶔淫熀漾漾兮奪精僊之人兮威蕤紛何爲乎揚靈總圭笏兮相翔吹參差兮杳冥潏湟陸離班以屯塞兮振耀曶蠁瀾以煌熒四顧堨圠莘莘縱縱怪物神鬼紛羅交馳巨鼇没吻以釾釾兮卻贔屭而躨跜狻猊舕以奮亹兮作首目之耏耏巨靈高掌于雲外兮勢爪踢乎華衰女娥幼眇以流睇兮被長佩之蕤綏百怪欺􅓥以噩對兮儼瞵瞲而睽睢羣岳岳以嶷嶷兮隨顧盼以􅛖騃卒悚悚以驚魂兮中怡悵而意迷曾嶄窪窔日夜出雲滃沛茀鬰烟烟熅熅紛飈起而屬天兮汨混會而渾庉爾乃輕颸乍起宕拂四表淫揚驚奔泮渙騷擾紛紜邅迴以下降兮綢繆周盩轇以旁繞穹窿糾撓皇以囘薄兮紆鬱漫衍敷以綿邈圓宇廓以淸澂兮柔祇濫其漫漫匼而澒洞千里而無極兮州裨大瀛倒灌而外環于是紛􆁨惝怳溔溔涆涆隃陁曳巘闓闔旋冤濞洶洶其交會兮滂煩澹而紛屯嶄巖累峗怒起而涌出兮吸濞潚率迫隘而復還鯨囘鯤擊若光而若滅兮變化天撟襂以龍翰䖺䗤蝄像揚光以出入兮忽若鮫人水婓飄麗以眇曼三山滉漾歘在水下兮渺不知其所遷崪中起而突植兮又象碣石之孤騫湣􅅭譎幻儻忽而萬變兮單不可乎究原于是目駴意蕩志戄神疑忽兮改容微波不揚輕塵不飛􅀡際天極浩乎瀰濔沇沇溶溶鱗鱗離離嘻嘻兮旭旭天閽兮洞開翠爲縿兮朱爲旗金爲闕兮銀爲臺仙車九葩兮紫葢委麗鮮扁卉翕兮紛縕輝光􅋑耀兮陸離暢飃然而與神俱兮廓蕩蕩而高馳曳寫霧而遵逝兮厭浥襟之英英披蘼蕪之幡纚兮㝛隩嶇之松聲幽人爲我揮琴兮儀徵江鈺字麗田隱居山中遏素女于太淸山鳥更唱而赴曲兮流仙樂之泠泠紛吾窮此遐覽兮與無友而爲期揖松僑而儷游兮載羨門而與之歸逝散髮以消搖兮遺氛氣乎獨來乘日月之精照兮綴雲虹之采蕤左格澤之炎精兮右屬卿雲乎崦嵫蒼虯顥鸞赳螑以相待兮丹砂赤醴煜爛以凝滋餐六氣以呼吸兮差五采之璚枝庶遠遊之輶舉兮聊發軔乎自兹黃山賦余旣作游黄山賦或恨其闕略非昔者居方物别圖經沭浴崇陴羣類庶聚之意也乃復攟采梗槪爲之賦云丹陽之南蠻障之中有黟山焉是曰三天子之都上絡斗紀下樓衡巫外則率山崔嵬于近作嶂陪以大鱅屬以匡廬廬江出其西漸江岀其東千源萬湲經營淡澹各走相詭宛潬黯黮囘錡隘甗迫觸輡輱逆阞孫理梢窘岀窞勢若矢激不可迫覽雷岀電追轉石異聲闛沛汨淚泙龍鏗訇漻繆谽谺􅐀􅐀悲鳴鐘鏞穆羽將鎗代更蕩濊澡堨纎潛不藏文錦鱗礫瑩瑩煌煌若此者數百千處然後湀闢會流交注羣輸涖涖潼潼上合彭蠡下達曲江爾其大􅀔則岎岒崆崇糾纏崛崎積沓匼帀陰陽蔽虧夫容䓿􅣿倚天無茄形精互輝灼若朝霞其曾高則上出閶闔平睨寒門頫視一氣空如下天其窮陰則涸沍憀悷昩不見太陽乃有因提之雪循蜚之霜其石則踸踔刻削􅰗絫增積撙總別追重疊并益將顚復稽附躡蹠縱橫駴盱震心警魄黝質斑采􅋑燿龍鱗隨物成􅁚百怪干端若有鬼神突怒凌厲單不知其所原増巖重岫懿瞹窈冥環橑複笮脇施瓏玲陽光迆輝疑自地爥不見天形或乃澒竈金鼎威㽔玢靈匡牀方几羅于其庭霞文碧篆守以六丁爾乃覽其支絡周其宮別于前則雲門豁閕亢峙高闕夫容桃花紫石丹沙疊障擲盋靑鸞石人儦儦茷茷爰有溫泉是之自出天都巍巍巋然特雄蓮華右起爭隆匹崇紅杳交錯洪紛馮戎羣峯來朝若環紫宮其上則有仙扉石室醴泉之池日精月魄藏華發奇其左則天柱屼屼探珠參差軒轅上昇仙樂天衣靑鐔白鵝岒嶙嶤嶷九龍懸泉消搖之溪堪􅨅溶洗千態萬狀澄奠百尺輝黛沈颺列如緐星揮布茫望于中乃有錦鱗揚鬐石班無雄魶魚兒啼其石則有飛雲龍際容成浮邱石牀布水聖泉飛來松林采石紫雲翠微霍鮮互別􅲏翔相追其谷則乖龍老蛟䗕蜷淵處千􅓬亂入冬夏激雨鴻扶延延雲轉䨓聚丹臺中塡是日天海矕摡眾皺棽棽絫絫家彯厥嶄陴貢其惶絡繹臬杌藹空流光赩霞欱焱髦紛前翠彩瀖濩般爚旁于後則仙都岧嶤師子亹奮丹霞石琴屬以始信叢石筍植緣卒而起箾參􅯯岶偨池未已爾乃其木則有木蓮九照神州無偕檀杻蓊柏海桐辛夷楓檆桱榔樅桂黃楊枒权交柯魁瘣紛揚馮凌藩京鬱鬱䔿䔿上矗重陽喬羽聶炕旁卻日月中稽風聲欇槸叫囂無時晏甯頽根陰幹岀火自照輝輝熒熒其下乃有白虎蒼豹素蜼元熊山閭一角醜鹿人从倐來報往驚嗥羣訌貜父喜顧􅏈子猿公蒼髯修顔接幹囘叢透脫牢落天掉無窮其上乃有雙鵷獨鶴列仙之乘碧雞流離雍雍嬰嬰頻伽之鳥引曲赴節若調乎簧笙其松則枝梧節族膚石鬛雲蛟螭倒投之而鰭鱗仰矚撇烈不見極根奇瓌易貌視之無窮察之無端其下乃有琥珀威喜伏靈石脂蘊精閟采僊靈是資草則鋪于披靡軋芴蔚薱蘼蕪突蒟蒻薜荔􅃢瑚翠雲龍脩雲霧春芳隱隆秋馥霍濩花散榮翕習蔓茗靑碧翠紫菲菲菁菁炤燿煌扈不可紀名粤有大藥黃連山精餘糧大苦茱苄囘芸赤砂石乳紫芝丸莖石藍之花千年一榮神農未知兪跗未更若乃黃柑丹杏桃栗杜樼枇杷棠棃若橊木蘭彼子楙梅罅芳裂芬林禽崖密松肪出焉爾乃其懸磴突駴揭孽側足庾㟺犯崒坌踏确嶨仰冠傾陊俛跖窈邈震震慄慄萬端異類氣盡汗駴怳怳魂隊進不敢征退不得喙悠忽怊悵目不敢睞蚑息扶服熊經鳥䀪然後得屆焉若其淩鴻􅄥貫倒景憩湎􅊄息涬溟浮恍惚超虛無爛昭昭神靈居沆瀣涌瓊英充偓佺厮征歘扈豐融聚穀公樂呼吸亡雙于是天雨新霽蔚薈朝隮曀坱圠滂洋四施襄混懷隧馮谾陵夷東混扶桑日之所出南潰炎風西淹總極北沍積冰漫漫汨汨風至波起天地岌嶪狀若浮海說于碣石沄沄積􅤆化爲魚黿黴鯨奔鯢稠㟼繽翻土囊鬱勃萬響怒叫驚禽悲獸跖魂哀嘯轔轔隱隱不知處所頫聆忽荒皆在水下翔陽震盪涌波憑興浮彩下爛絢耀上升天紀地緯蓶扈煌熒九光十彩轉互代更蓬萊閬風昆侖曾城琪樹建木珊瑚琳瑉戴勝虎齒雒陽流形􅉭􅉭無端隨望而生絪縕元黃憺將會㦽憑蒙龍睨天縡靈之䬠䬠鎭高邁橫凌九坑杳天外于胥樂兮發蒙葢寒蟬賦陸士龍謂蟬有五德故爲作賦亦復僑居之感貧才之歎也余唯其蛻濁濊辭泥滓淸潔莫尚無營于物而喧喧不已豈莊生逍遙老氏守嘿之旨耶暇日省陸賦聊致思焉夫何寒蟬之修絜感時運而來翔辭緇涅于埃濊翩乘風而逌行儵旣翕于五日歘畢伏于淹望何變化之至神而知幾之孔章也端廣頟以飾首抗修緌以儀冠斑文章之照爛矯流離于輕翰嘰醴泉以爲飮接沆瀣而爲餐棲一枝而有餘翳片葉而爲安心抱淸而守素體逍遙以自然胡嘒嘒以悲號聲感激而永慕橫滔涸而頻咽鬱昶厲而縈互紛旁振以接響唉逐聲而合趣款餘芬于勁秋弔陳芳于假夏恐雨雪之夙集淹餘光之易謝怨王孫兮不歸紛啾啾而誰訴豈緘默之不能將多言而未寤頌曰繄惟寒蟬稟五德兮精􅀋外糅丙任白兮居高揚淸姱而不閉兮應􅃸守信亮志以壹兮含氣飮露泊其無求兮逍遙棲遲孰非大游兮盇葆厥章貞以長靜兮閉志自藏保正性兮椉汙遷爽任而不守兮嗟爾至德永以爲友兮秋霖賦何重􅙨窅窅之瞹瞹兮曀訰訰而無譌八溟傾以雴霫兮天地鬱沓以滲離羲和潛轡于太陰兮金樞弭節而勿御屏翳睄雿以扇威兮豐隆日夜而屯聚値秋氣之淒淒兮況兹霖之湁潗登高城之曠覽兮潦汨淢以四集淸漳奔陽以潰溢兮平蕪溔溔以灄灄川原淼其無津兮哀行旋之深涉驚鴟高鷹側翼而孤瞬兮雁嗷嗷而無依寒翨溼而不飛兮稻梁悠而不歸心抑鬱而無憀兮暮獨返乎虛堂風淒淒而入幃兮􅋼循檐之浪浪茅闔苫而不蔽兮雨足入于空牀夜沾溼而十起兮屢顚倒乎余裳獨專專而不寐兮百慮頺而侵尋故鄕杳以日遠兮又流轉而北南唯同懷之􅓦厯兮共千里之忉心造分襟于假夏兮淹淸秋之緒風欲褰裳而就之兮限浮潦之淫淫念人生之靡樂兮恨秋夜之不旦聊援翰以抽思兮誶中懷之惓惓望江南花賦庭有小草宵聶晝炕莖不盈尺黃花五岀四柎交蓓僢而同氏必其偶縱午相代開秋發芳風嚴霜頺而彼寸柯方􅞉厥章客有言其名者是曰望江南之花旣感其道爰爲賦焉何小草之珍瑋感兹名之見奇其纖支附柯簡節薄葉之䕻生也翳弱草縈蕪􅑰根萌諶荏枝條倚靡遊塵離焉穨飈吹焉於是晩春早夏百卉茂止紆丹睨其左錯紫睥其右亄費翬散饒部瀾漫于其側拂兮其不逮時也委委猗猗誠未足以命知其異也抽兮首兮攦乎其不爲之友也爾其䚕朝陽而布葉矯夕儀而歛陰託秋霜而表榮倚曾墀而效心華不飾悅香不越林羣不比標偏不戾參獨專專兮沈沈體志安隱醰醰深深淒淒兮秋風飄颻兮吹我襟初服兮敢化恐冉弱兮弗任諒君子之不佩悵永望兮江南竹樓賦崔格􅀸􅄝竹自號曰竹樓好事者爲畫竹樓圖煙標旣竝雲矚在兹亦勝情者所寄也請余賦之辭曰江南之幽篠兮百尺而不見陽石結根而成色雲裁葉而舒光赤山匼素流折紺嵾嵳縹淚汩山雕氣而縟景水陽朝而陰夕乃有高樓起乎其中修欄層倚空牖玲瓏虛瑤席以受碧倒璦霞而鏡紅蒼苔孤侵人聲四沈單鶴偶叫濳虯一吟雲百態而逕入風萬響而來尋于是幽居之士任達之流逌爾長嘯􅄅焉登樓結柔條兮三春發勁幹兮九秋是時芳杜已歇桂枝方彫悟窈窕之旣晏顧防露之未朝理紛縕之昔悅屬郢客之長謠謠曰洞庭波兮湘水深山中人兮靑玉䘳橫千里之騁望報蘭茝之素心遂爲頌曰猗彼修竹君子德兮綠文翠章儀其有則兮登高望遠孰其可識兮絕世獨立與爾爲極兮賃春賦海甯張文在僑居京師屬畫者作賃舂圖以自況爲擬梁生之賦以敘之時恇恇兮不畱淹吾馳兮未央周皇都兮結覽悲窈窕兮日長感梁鴻兮作歌摻妻息兮内傷信余志兮弗諒容囘徇兮微祿果摶觚兮異方世不云兮我穀總余駕兮將逝攬九州兮一逵心􅅭沄兮故閭雲薆薆兮蔽之託廡下兮顑顇聊消搖兮時曁固靡冀兮尙賢幸芳馨兮未沫惟歲暮兮窮陰風調調兮振林眾􅚖􅚖兮余笑心惻惻兮孰任鄧石如篆勢倉籒旣悠蟲鳥茫晦秦斯改文小篆是紀大書刻山封石頌德摛華絢豓後蓺是則佐隸趨簡迺及分勢六書載淆八體亦廢二漢緜延厥緒弗恢金刻石薶莫究莫追般般石鼓發于陳倉疇曰體譌庶有憲章在唐李監載紹厥武我聞其書蟲蝕鳥步傳刻世貿厥眞亦抎娿姿嫷姸維僞斯仞鍾張之法代傳代工曾是曩文弗軌弗蹤猗歟鄧生好古能述振兹墜風洪此藻筆俗學紛縕辭之廓如古人不見誰毁誰譽聞諸蔡邕篆勢有賦旁涉僞作緣絲凝露用範用閑竚思詳觀敷摧彬粲永光藻翰其詞曰霅兮風囘歘兮電追棽兮梢雲之冒松榯濞兮百川之隘堆屺潎兮逆折豁閕而東歸淸思下烝迅神上落經緯中彌觚芒周作突植立以離偶乃翕趨而佹遌窈窈冥冥若首若驚若應龍將鯢以須震霆幡幡幓幓若陽若陰似柔柎霣榮不可見風或衡運規旋或孤岀介入或來而忽往或闢而不翕或圭組黻佩或瓦碎冰涾縱橫細緼絡繹繽紛遠而望之若異類崪噩竝岀􅸀首目之縱莘卽而察之若慈母字子裴囘遷轉煦嫗而相分何分銖之足算豈金鐵之作儗掁蓺林之絕塵追軼軌于秦始嗟作者之難覩信知道之實稀舉梗槪而略論願執簡以回歸長平鏃箴內閣中書趙君億孫藏銅鏃一枚云自言其外祖父某副使官山西得之高平土中其地是古長平疑秦趙戰鏃也脊中而殺以爲刃以周尺度之長二寸兩從迤以博得寸之半鋌斷存者半寸而旁鋌而下刃枝岀夾笴者寸也權其重得今稱七銖二絫于古葢半鋝而弱以是知考工記云閷矢長寸圍寸鄭康成氏讀爲長二寸猶信而圍亦當爲二寸而鄭氏略也又惜其鋌之不完無以測古三垸爲幾何重也趙君幼而受之其母夫人夫人幼而受之副使往時其廬火夫人嫁時物悉燬而此鏃獨存今夫人殁若干年趙君出視未嘗不欷歔也余旣獲觀焉又讀趙君所自爲銘感其志乃作箴曰巖巖古鏃出自長平昔在嬴趙戰爭所營磔磔革革曰維凶悳孰樹倳斯而是寶是服旣刊旣薶旣夷厥銛旣賁厥華而蒼赤是漸旣拔曾壤旣襲厥珍孰吉金赤而此焉不賓故晦者飾之大恆者道之泰有眾弗愛雖材必劌有文弗揚雖刓必章矯性而性性性者門也無用而用尊用者存也匪童之誨曰以爲戒匪今之諄曰母訓是勤母言不更敢吿侍旁七十家賦鈔目錄序右賦七十家一百八十篇通人碩士先代所傳奇詞奥旨備于此矣其離章斷句闕佚不屬者與其文不稱詞者皆不與是論曰賦烏乎統曰統乎志志烏乎歸曰歸乎正夫民有感于心有槪于事有達于性有鬱于情故有不得已者而假于言言􅁚也􅁚必有所寓其在物之變化天之漻漻地之囂囂日岀月入一幽一昭山川之崔蜀杳伏畏佳林木振硪谿谷風雲霿霧霆震寒暑雨則爲雪霜則爲露生殺之代新而嬗故鳥獸與魚草木之華蟲走螘趨陵變谷易震動薄蝕人事老少生死傾植禮樂戰􅃲號令之紀悲愁勞苦忠臣孝子羈士寡婦愉佚愕駭有動于中久而不去然後形而爲言于是錯綜其詞囘牾其理鏗鎗其音以求理其志其在六經則爲詩詩之義六曰風曰賦曰比曰興曰雅曰頌六者之體主于一而用其五故風有雅頌焉七月是也雅有頌焉有風焉烝民崧高是也周澤衰禮樂缺詩終三百文學之統熄古聖人之美言規矩之奥趣鬱而不發則有趙人荀􅀸楚人屈原引詞表恉譬物連類述三王之道以譏切當世振塵滓之澤發芳香之鬯不謀同偁竝名爲賦故知賦者詩之體也其後藻麗之士祖述憲章厥製益繁然其能者之爲之愉暢輸寫盡其物和其志變而不失其宗其淫宕佚放者爲之則流遁忘反壞亂而不可紀譎而不觚盡而不觳肆而不衍比物而不醜其志潔其物芳其道杳冥而有常此屈平之爲也與風雅爲節渙乎若翔風之運輕赮灑乎若元泉之出乎蓬萊而注渤澥及其徒宋玉景差爲之其質也華然其文也縱而後及雖然其與物椎拍宛轉泠汰其義轂輠于物芴芴乎古之徒也剛志決理輐斷以爲紀內而不汙表而不著則荀􅀸之爲也其原岀于禮經樸而飾不斷而節及孔臧司馬遷爲之章約句制奡不可理其辭深而旨文確乎其不頗者也其趣不兩其于物無勥若枝葉之坿其根本則賈誼之爲也其原出于屈平斷以正誼不由其曼其氣則引費而不可執循有樞執有廬頡滑而不可居開決宦突而與萬物都其終也芴莫而神明爲之橐則司馬相如之爲也其原出于宋玉揚雄恢之脇入竅出緣督以及節其超軼絕塵而莫之控也其波駭石咢而没乎其無垠也張衡盱盱塊若有餘上與造物爲友而下不遺埃墟雖然其神也充其精也苶及王延壽張融爲之傑格拮摋鉤孑菆牾而俶佹可覩其于宗也無蛻也平敞通洞博厚而中大而無瓠孫而無弧指事類情必偶其徒則班固之爲也其原出于相如而要之使夷昌之使明及左思爲之博而不沈贍而不華連犿焉而不可止言無端厓傲倪以爲質以天下爲郛廓入其中者眩震而謬悠之則阮籍之爲也其原出于莊周雖然其辭也悲其韻也迫憂患之詞也塗澤律切荂􅞉紛悅則曹植之爲也其端自宋玉而枿其角摧其牙離其本而抑其末浮華之學者相與尸之率以變古曹植則可謂才士矣搰搰乎改繩墨易規矩則佞之徒也不搰于同不獨于異其來也首首其往也曳曳動靜與適而不爲固植則陸機潘岳之爲也其原出于張衡曹植矯矯乎振時之儁也以情爲裹以物爲襮鑱雕雲風琢削支鄂其懷永而不可忘也坌乎其氣煊乎其華則謝莊鮑昭之爲也江淹爲最賢其原出于屈平九歌其掩抑沈怨泠泠輕輕其縱脫浮宕而歸大常鮑昭江淹其體則非也其意則是也逐物而不反駘蕩而駁舛俗者之囿而古是抗其言滑滑而不背于塗奥則庾信之爲也其規步矱驟則揚雄班固之所引銜而控轡惜乎拘于時而不能騁然而其志達其思哀其體之變則窮矣後之作者槪乎其未之或聞也莊先生遺文後序右莊先生遺文若干卷其子有可輯錄先生德博而居隘志昌而遇蹇更貧困務自刻苦爲學問於六經之指古先聖之微言絕學三代之制作井田禮樂政法卓卓大義削刻傳注審白決黑究之于心持論不爲師說搖惑將欲有所著述未及就以授有可先生之殁二十年而有可學成周易春秋毛詩周官具有論說旣乃􅁧次先生所爲古文辭歌詩都爲一編匄其友王灼敘而藏之葢有可旣成先生之志乃敢集先生之文葢其重也余不幸幼而孤少長讀先君子所爲詩識先生名知先君子于先生友也旣與有可游識先生之緒論有可之窮如先生其爲人進退無咎悔其學不求知于世一如先生先生雖藴其學不得施用有可能述其書以傳于後能成其身以章先生之德其父子之際雍容刻厲觀于兹編可以悲而樂之先君子旣與先生交有可又辱與予善而予學日以困無以自樹立將忝其先人于有可之集先生文益愧赧悚惕而不能自已也書墨子經後右墨子經上下及說凡四篇晉書魯勝傳云勝注墨辯引說就經各附其章卽此也墨子書多奥言錯字而此四篇爲甚勝注旣不傳世莫得其讀今正其句投通其旨要合爲二篇略可指說疑者闕之古者楊墨塞路孟子辭而闢之自孟子之後至今千七百餘年而楊氏遂亡墨氏書雖存讀者葢鮮大哉聖賢之功若此盛矣墨氏之言脩身親士多善言其義託之堯禹自韓愈氏以爲與聖賢同指孔墨必相爲用向無孟子則後之儒者習其說而好之者豈少哉老氏之言其始也微不得孟子之辨而佛氏之出又絕在孟子後是以蔓蔓延延日熾月息而楊墨泯焉遂微吾以悲老佛之不遭孟子也當孟子時百家之說眾矣而孟子獨拒楊墨今觀墨子之書經說大小取盡同異堅白之術葢縱橫名法家惠施公孫龍申韓之屬皆出焉然則當時諸子之說楊墨爲統宗孟子以爲楊墨息而百家之學將銷歇而不足售也獨有吿子者與墨爲難而自謂勝爲仁故孟子之書亦辨斥之嗚呼豈知其後復有烈于是者哉墨子之言誖于理而逆于人心者莫如非命非樂節葬此三言者偶識之士可以立折而孟子不及者非墨之本也墨之本在兼愛而兼愛者墨之所以自固而不可破兼愛之言曰愛人者人亦愛之利人者人亦利之仁君使天下聰明耳目相爲視聽股肱畢强相爲動宰此其與聖人所以治天下者復何以異故凡墨氏之所以自託于堯禹者兼愛也尊天明鬼尚同節用者其支流也非命非樂節葬激而不得不然者也天下之人唯惑其兼愛之說故雖他說之誖于理不安于心者皆從而則之不以爲疑孟子不攻其流而攻其本不誅其說而誅其心被之以無父之罪而其說始無以自立嗟夫藉使墨子之書盡亡至于今何以見孟子之辨嚴而審簡而有要如是哉孟子曰我知言嗚呼此其驗矣後之讀此書者覽其義則于孟子之道猶引􅁌以知矩乎讀荀子一言而本末具者聖人之言也有所操有所遺然而不虛言言以救世者賢人之言也操其本者不弊操其末者未有不甚弊者也孔子之言性曰性相近習相遠上知與下愚不移所謂一言而本末具者也孟子之言性善所謂操其本也荀子之言性惡所謂操其末也其言殊其所以救世之意一也孟子曰口之于味目之于色鼻之于臭耳之于聲四肢之于安佚是性也不亦與荀子言人之性飢而欲飽寒而欲暖勞而欲休者同乎哉荀子曰無性則僞之無所加無僞則性不能自美又曰義與利者人之所兩有也雖堯舜不能去民之欲利雖桀紂亦不能去民之好義不亦與孟子言民之秉彜故好是懿德者同乎哉公都子問孟子曰吿子曰性無善無不善或曰性可以爲善可以爲不善或曰有性善有性不善三說皆非歟孟子曰乃若其情則可以爲善矣乃所謂善也然則孟子不以三說皆非者豈不以上知之性善下愚之性不善而中人可以爲善可以爲不善者哉雖然由孟子之說則人得自用其爲善之才而道甚邇事甚易由荀子之說則道者聖人所以撟揉天下之具而人將厭苦而去之故荀子之意與吿子異而其禍仁義與吿子同則操其末者之弊必至于此也雖然孔子言仁而孟子益之以義荀子則約仁義而歸之禮夫義者人之裁制也禮者仁義之檢繩也孟子之教反身也切荀子之敎檢身也詳韓子曰求觀孔子之道必自孟子始後之學者欲求其途于孟子自荀子始焉可也續柳子厚天說或曰柳子之說天也比之果蓏癰痔草木天固若是無知乎曰蒼蒼者謂之天亭亭者謂之地歔歔翕翕者謂之元氣陰陽其有知也無知也吾不得而知也審無知乎柳子之說備矣審有知乎吾爲柳子竟之凡有知者孰過于人人之身枵然而虛其中者天地耶呼吸而往來者元氣陰陽耶人之以有知者神也其帝之主宰于天地陰陽元氣者耶然則人居天地之中其猶心毛肝葉耶其脾之榮膽之精肺之魂魄耶必且猶蟯蛕之居且食于藏者耶其有不善之生也不猶蠱之與瘕者耶蟯蛕之在于藏也未有知之者也其死而岀于後然後知藏之有蟯蛕也其奚則生其奚則死其亦仰而訴于吾乎其亦哀而欲吾之仁之乎人且有恩若罰于蟯蛕者耶寒溼之宛而蟲生焉食之蠱而蟲生焉其生而戕于藏府痛知于身而不知其爲蟲也有扁􅍎者藥而下之扁􅍎者知之其人不知也魯之氓有食生菜而蛭生于腹者病三年他日誤食芫華而病愈故自生以至其斃而魯之氓不知有蛭也夫屏穀而導引者去三蟲蟯蛕未有生焉者也其次和藏氣調血脈瘕蠱未有生焉者也神之濁而有蟯蛕神之亂而有瘕蠱然則人之生于元氣陰陽之薄也決也彼且及知有生其閒者耶知有生其閒者母亦待彼芫華扁鵲者耶而怨之而哀之而望其賞與罰焉者非惑耶送惲子居序余少時嘗服馬少游言求爲鄕里善人以沒吾世年二十七來京師與子居交觀其議論文章䃺切道德乃始奮發自壯知讀書求成身及物之要八年之閒共躓于舉場更厯困苦出頫仰塵俗入則相對以悲已相顧自喜益甚凡余之友未有如子居之深相知者詩曰無言不讎子居之益余多矣于其選而爲令余可以無言始子居之語余也曰當事事爲第一流余愧其言然未嘗忘也凡余之學嘗求其上矣自以爲不足則姑就其次故往往無成焉夫爲令之道六經孔孟之所述子居向時之所道者皆其上者也以子居爲之其不可以至耶曰吾不爲彼之所爲者而已豈子居向時之所道耶君子出其言則思實其行思其行則務固其志固志莫如持情實行莫如取善是乃子居之所以益余者也子居勉之矣送張文在分發甘肅序古之所謂良有司者不待其莅政治民也觀其所以汲汲者則其於守也可知矣是故有躁進之心則必有趨勢之術有患貧之心則必有冒貨之漸雖有特達之才廉恥之念其入于勢利也猶靮之在項冪之在目而以旋于磨雖欲自拔其足其勢固不得已嗚呼今之有志于吏道者鮮矣今各省自州縣至丞尉謁吏部而出者歲數百餘人其人皆有司牧之責其閒亦有知名義識廉恥者然吾觀其所以進爭尺寸之捷較出入之勢進退之械則未有不求熟者及其選而得官則譁然曰某地善某地惡得之者忻戚色然問其所以爲善惡者則非政之險易也非民之湻澆也曰某地官富曰某地官貧嗚呼士未莅官未治民而所汲汲者如此古之良有司其終不可見乎海鹽張文在强毅慷􅁣喜任俠然敦爲孝弟少舉于有司困不遂走京師􅉆事國史館積若干年以勤能例得府經厯又幾年史館移選人入吏部文在例得與而主者抑之不得選今年秋以貲入請試用分發得甘肅甘肅地邊塞民窮官貧自長吏以下不能具輿馬士大夫宦者視爲畏區而文在以磊落才抱負奇氣浮汩爲吏十餘年更偃蹇摧困始得一官而當遠絕西徼家又甚貧雖知相者皆爲文在不樂而文在處之晏然且曰吾聞甘肅民朴而政􅂤長官無奔走賓客無繇役此眞吾所樂者君子于是知文在之賢其不躁進也其不患貧也其有守也他日莅政治民其爲良有司也無惑焉于其行也序以送之莊君墓表乾隆五十七年正月十三日故國子監生莊君卒年七十以某年某月日葬于某原自君未卒之二年故患噎疾者垂三十年矣慬乃得愈恆杜門􅂤人事而其宗祠舊有田產主者弗能理日以落羣議代者難其人君奮然曰吾老矣幸而不死請以餘生治此他日可以見先人乎乃取出入籍日夜鉤校之必親仿北渠吳氏義莊約定爲章規榜祠中北渠吳氏者自明時其祖性置祠産號爲義莊子孫守之至今郡人比之吳范氏君旣與族人約盡釐宿所弊經畫之至忘寒暑飮食家人固請少息不聽如是者十餘月條理屬具而君勞苦致疾竟卒君生數歲而喪母事考石門君朝夕無方四十餘年未嘗廢左右石門君致官家居君之兄曰綸渭中進士知縣武康嘗迎親就官舍然石門君尤樂君之養居數月輒歸維綸渭亦樂君之能養其親也君應舉于鄕再進再詘或勸試京闈君以石門君故不可其後疾作遂絕意仕進焉石門君之卒會有故十年不克葬君常自咎責執心喪不御音樂及畢封樹顧謂其子宇逵曰吾今臥背始帖席也君性狷潔無棄言無責諾聞人是非若出在己又盛氣與人言偶及不平事立發憤大恚變色氣上逆久之乃己喜讀史至其感􅁣往往盛怒投卷起左右皆卒愕其得噎疾以此及理祠事事或不能副君意君盛氣忼嘅益銳身以爲己責故其心力尤瘁竟不支云君諱緗衡字耘石祖令輿翰林院編修考相承中明通榜初爲靈壁縣敎諭選授湖南石門縣知縣以疾乞休母董太宜人莊氏世爲武進顯族自君祖父時以進士起家者同時十餘人至君而抑困子宇逵有儁才復躓有司君謂之曰自吾祖入翰林以官籍解于省者六人昔之易今之難也聞之再植之木其根必傷汝好培之葢君之用意如此君配吳儒人涇縣敎諭振聲之女所謂北渠吳氏者也爲婦謹爲母莊先君七年卒子一人卽宇逵縣學生女一人壻董某君之葬也邑之士來會喪咸以君有質行墓不可無表以書走京師抵宇逵之友張惠言曰子宜爲文嗚呼君不幸以疾廢于世不得有所施設及其事親成身可以有立于後矣乃系之以銘曰靡至誦聖人之書而未識其道其于景偁未有以相過也而窮困之效已明白景偁遊公􅀸閒名聲日起當世所謂速化之術固當聞之乃退然就執友之門而請受業欣然若有樂者惜乎不遇韓退之使與李翺張籍之徒相頡頏也景偁之學拙于進而勇于取雖小物務旣其實與之論道理未嘗不悅其改過果以速嗚呼使假之年而就其學豈可量哉景偁字格􅀸蒲州永濟人以乾隆五十八年五月十二日卒于京師年二十五其爲人長弟完好生而父兄稱之殁而所與遊者思之工八分楷書摹印世多藏者余獨悲其有盛志而卒不遂其學以無聞于後爲可惜也爲辭以哀之曰嗚呼偁耶羣黯黮以爲賢誰使興耶旣朝軔而夕顚又誰憎耶苟嗇其命而胡以厚其憑耶將匪獲于天而獨自以心爲雄耶才者之小年延于不肖者之恆耶泯泯于後世而落落乎古人嗚呼柰何乎偁耶茗柯文初編終茗柯文二編卷上楊隨安漁樵問對圖賦并序楊子圖其貌爲一漁一樵取邵康節氏之文題之曰漁樵問對于時歲在己酉以書命余于京師曰其爲我賦之余時甫涉易學自以未知道不敢以爲其後余南還罹母氏之戚則又不暇以爲今年之春乃得就楊子而觀所謂漁樵問對圖者縱言及于易余謂楊子曰康節氏之爲此言也豈不越哉曰火無體薪無用火以用爲本以體爲末故動水以體爲本以用爲末故靜天本用地本體然故靜體而動用也余以爲不然乾恆易坤恆􅂤體也乾靜也專動也􅀡坤靜也翕動也闢皆用也彼康節者其道家言乎先陰而後陽舍奇而用耦先天橫圖地居東天居西以陰爲體也二而四四而八而十六而三十二而六十四陰之數也易則不然始于一變而七九二八六麗于一七九者也故易乾道也陽道也畫數三兩之而六陰從陽也易也者體陽而用陽先天者體陰而用陽易者體陰陽而用動靜先天者體靜而用動然則康節爲老氏之徒無惑也吾子覃思卦爻規榘天地時有所得往往合于鄭荀易學廢久矣庶幾吾子是賴今乃取康節之說以自表母乃逐其末而未究其本苟隨俗學之軌轍而未折衷于大道也楊子曰子之言則誠晰矣雖然夫易同歸而殊途一致而百慮故曰廣矣大矣不可爲典要今夫步日月者右行及以左行推之而不忒者進退之數也昔者孟子言性善荀􅀸反之言性之善惡雖異而其敎人爲堯舜仁義則一也吾惡知夫言陰之耦者非所以言陽之奇乎吾惡知夫言體之非用言用之非體乎且吾聞之求道于易猶挹水于淵取明于太陽也各得其所資焉今吾伏鄕里誦先王之書上以事父母下焉友朋是娛動則不足而靜或有餘性又善病庶幾遺物之役役者以寕吾軀故凡體其靜而待動者眞吾之徒也又何怪于斯圖也哉余曰唯唯乃爲之賦曰魚以膏自烹兮薪以明自燒大哉水火之爲貞兮化萬形而不膠繄動靜之無方兮固體用之合德火假薪而後然兮水寄魚而後食夫唯火之爲用兮用其無用也傳旣盡而不滅兮吾不知其所從也水之爲體兮體其無體也逝日夜而不舍兮吾不知其所底也用者人兮體者身兮身者主而人者賓兮無滑而魂無塞而門而以卑其施而藴其文以全吾之眞兮周易虞氏義序虞翻周易注釋文云十卷隋書經籍志云九卷翻字仲翔會稽餘姚人少好學有豪氣又善矛太守王朗命爲功曹朗爲孫策所敗翻追隨營護到東部侯官朗遣翻還策復以爲功曹待以交友之禮多所匡諫策嘗納之策攻黃祖翻從說華歆下豫章還至吳策曰孤有征討事未得還府􅀸復以功曹爲吾蕭何守會稽其見委重如此出爲富春長漢徵爲侍御史不赴曹操爲司空辟之翻曰盜跖欲以餘財汚良家耶策薨孫權以爲騎都尉數犯顔諫爭權不能說又性疏􅀡數有酒失權因醉手劎欲擊之大司農劉基固爭得免其後權與張昭論神仙事翻指昭曰彼皆死人而語神仙世豈有仙人也權遂怒左右多毁翻乃徙翻交州十餘年卒于交州翻博學洽聞雖處罪放而講學不倦門徒常數百人爲周易論語國語老子參同契注解周易日月變例周易集林律厯太元明楊釋宋其書皆亡目錄在三國志傳及隋唐書志自漢成帝時劉向校書考易說以爲諸易家說皆祖田何楊叔丁將軍大義略同唯京氏爲異而孟喜傳易家陰陽其說易本于氣而後以人事明之八卦六十四象四正七十二候變通消息諸儒皆祖述之莫能具當漢之季年扶風馬融作易傳授鄭康成康成作易注而荆州牧劉表會稽太守王朗潁川荀爽南陽宋忠皆以易名家各有所述唯翻傳孟氏學旣作易注奏上之獻帝曰臣聞六經之始莫大陰陽是以伏羲仰天縣象而建八卦觀變動六爻爲六十四以通神明以類萬物臣高祖父故零陵太守光少治孟氏易曾祖父故平輿令成纘述其業至臣祖父鳳最有舊書世傳其業至臣五世前人通講多玩章句雖有祕說於經疏闊臣生遇世亂長于軍旋習經于枹鼓之間講論于戎馬之上蒙先師之說依經立注所覽諸家解不離流俗義有不當實輒悉改定以就其正又奏曰經之大者莫過于易自漢初以來海內英才其讀易者解之率少至孝靈之際潁川荀諝號爲知易臣得其注有愈俗儒至所說西南得朋東北喪朋顚倒反逆了不可知孔子歎易曰知變化之道者其知神之所爲乎以美大衍四象之作而上爲章首尤可怪笑又南郡太守馬融名有俊才其所解釋復不及諝孔子曰可與共學未可與適道豈不其然若乃北海鄭元南陽宋忠雖各立注忠小差元而皆未得其門難以示世荀諝者荀爽也是時少府孔融善其書與翻書曰自商瞿以來舛錯多矣去聖彌遠眾說騁辭曩聞延陵之理樂今觀吾子之治易知東南之美者非徒會稽之竹箭也又觀象雲物察應寒温原其禍福與神合契可謂探索旁通者已翻之言易以陰陽消息六爻發揮旁通升降上下歸于乾元用九而天下治依物取類貫穿比附始若瑣碎及其沈深解剝離根散葉鬯茂條理遂于大道後儒䍐能通之自魏王弼以虛空之言解易唐立于學官而漢世諸儒之說微獨資州李鼎祚作周易集解頗采古易家言而翻注爲多其後古書盡亡而宋道士陳摶以意造爲龍圖其徒劉牧以爲易之河圖洛書也河南邵雍又爲先天後天之圖宋之說易者翕然宗之以至于今牢不可破而易陰陽之大義蓋盡晦矣我皇淸之有天下百年元和徵士惠棟始考古義孟京荀鄭虞氏作易漢學又自爲解釋曰周易述然掇拾于亡廢之後左右採獲十無二三其所自述大抵祖禰虞氏而未能盡通則旁徵他說以合之蓋從唐五代宋元明朽壞散亂千有餘年區區脩補收拾欲一旦而其道復明斯固難也翻之學旣世又具見馬鄭荀宋氏書考其是否故其義爲精又古書亡而漢魏師說略可見者十餘家然唯荀鄭虞氏三家略有梗槪可指說而虞又較備然則求七十子之微言田何楊叔丁將軍之所傳者舍虞氏之注何所自焉故求其條貫明其統例釋其疑滯信其亡闕爲虞氏義九卷又表其大恉爲消息二卷庶欲探嘖索隱以存一家之學其所未寤俟有道正焉耳虞氏易禮序韓宣子見易象與魯春秋曰周禮盡在魯矣記曰夫禮必本于太一轉而爲陰陽變而爲四時其降曰命故知易者禮象也易家言禮者唯鄭氏惜其殘闕不盡存又其取象用爻辰爻辰者遠而少變未足以究天地消息至其原文本質使周家一代之制損益具備後有王者監儀在時不可得而廢也虞氏于禮蓋巳略矣然以其所及揆諸鄭氏源流本末蓋有同焉何者其異者所用之象也而所以爲象者不殊故以虞氏之注推禮以補鄭氏之闕其有不當則闕如一以消息爲本虞氏易事序孟氏說易本于氣而以人事明之然虞氏之論象備矣皆氣也人事雖具說然略不貫穿匪獨虞爾鄭荀多說人事者爻象亦往往錯雜後學不得其通乃始苦其支窒而不能騁于是悉舉而廢之而相辯以浮辭日以益眾夫理者無迹而象者有依舍象而言理雖姫孔靡所據以辯言正辭而況多岐之說哉設使漢之師儒比事合象推爻附卦明示後之學者有所依逐至于今曲學之響千喙一沸或不至此雖然夫易廣矣大矣象無所不具而事著于一端則吾未見漢儒之言之略也述易事云爾周易鄭荀義序漢儒說易大指可見者三家鄭氏荀氏虞氏鄭荀費氏易也虞孟氏易也鄭氏言禮荀氏言升降虞氏言消息昔者虙犧作十言之敎曰乾坤震巽坎離艮兌消息鄭氏贊易實述之至其說經則以卦爻無變動謂之彖辭夫七八者彖九六者變經稱用九用六而辭皆七八名與實不相應非虙犧氏之旨也爻象之區旣隘則乃求之于天乾坤六爻上繫二十八宿依氣而應謂之爻辰若此則三百八十四爻其象十二而止殆猶溓焉此又未得消息之用也然其列貴賤之位辯大小之序正不易之論經綸創制吉凶損益與詩書禮樂相表裏則諸儒未有及之者也荀氏之說消息以乾升坤降萬物始乎泰終乎否夫陰陽之在天地出入上下故理有易有簡位有進有退道有經有權歸于正而已而荀氏言陽常升而不降陰常降而不升則姤遯否之義大于旣濟也然其推乾坤之本合于一元雲行􅀨施陰陽和均而天地成位則章章乎可謂得易之大義者也虞氏考日月之行以正乾元原七九之氣以定六位運始終之紀以敘六十四卦要變化之居以明吉凶悔吝六爻發揮旁通乾元用九則天下治以則四德蓋與荀同原而閎大遠矣王弼之說多本鄭氏而棄其精微後之學者習聞之則以爲費氏之義如此而已其盈虛消長之次周流變動之用不詳于繫辭彖象者槪以爲不經若觀鄭荀所傳卦氣十二辰八方之風六位世應爻互卦變莫不彰著劉向有言易家皆祖田何楊叔丁將軍大義略同豈不信哉治易者如傳春秋一條之義各以其例時若可比䆒則迥殊李鼎祚朱震合諸家而爲說是知日之圓而不知其不可以爲規也余旣述虞氏之注爲消息以發其義故爲鄭荀各通其要以俟治古文者正焉易義別錄序敘曰孔子曰天下同歸而殊塗一致而百慮水之爲川也源有大小流有長短而皆可以至于海則斷港絕潢莫得而儗焉者其塗通也吳秦人之生也同聲及其長而不相通然累譯而皆得相喻者其意同也聖人之道著之于經傳之其人師弟子相與守之然夫子沒而微言絕二百餘年之閒以至漢興詩分爲四春秋分爲五此皆七十子所親受世世傳業口授而筆記猶尙如此源遠末分非秦火之禍也況乎去聖久遠經􅂤廢絕承學之士各自爲宗差若毫釐謬以千里可勝道耶然揆其本原罔不依經附傳承師論法雖汎濫殊等其歸不同者尟矣故規矩之所出非一木之材也皆成器焉器不足以盡規矩則有之矣求之于規矩之外而得之者未之有也易之傳自商瞿子以至田生惟一家焦氏後出及費氏爲古文而漢之易有三自是之後田氏之易楊施孟梁邱高氏而五唯孟氏久行焦氏之易爲京氏費氏興而孟京微焉夫以傳述之統田生丁將軍之授受則孟氏爲易宗無疑而其行不及費氏者以傳受者少而費氏之經與古文同馬融鄭康成爲之傳注故也王弼注行而古師說廢孔穎達正義行而古易書亡其見于釋文敘錄者自晉以前三十有二家李鼎祚集解所引二十有三焉皆微文碎義多不貫串蓋易學埽地盡矣可不惜哉夫不盡見其辭而欲論其是非猶以偏言決獄也不盡通各家而欲處其優劣猶援白而嘲黑也余于易取虞氏旣已推明其義以鄭荀二家注文略備故條而次之自餘諸家雖條理不具然先士之所述大義要旨往往而有不可得而略也乃輯釋文集解及他書所見各爲別錄義有可通附著于篇因以得其源流同異若夫是非優劣亦可考焉凡孟氏四家孟氏姚信翟元蜀才京氏三家京氏陸績千寶費氏七家馬融宋衷劉表王肅董遇主廙劉瓛子夏傳非漢師說別爲一家孟氏孟喜正義作僖字長􅀸東海蘭陵人從田王孫受易舉孝廉爲郞曲臺長病免爲丞相掾漢書藝文志易章句孟氏二篇隋志云八卷殘缺梁十卷釋文敘錄云十卷無上經又引七錄云下經無旅節無上繫今集爲一卷漢興言易者自田何田何之傳王同周王孫丁寛服生各著易傳楊何受王同蔡公受周王孫亦各爲傳田王孫受丁寛授施讎孟喜梁邱賀施孟梁邱各爲章句施氏之後有彭宣戴崇作易傳景鸞作易說孟氏之後有洼丹作易通論袁京作難記梁邱之後有五鹿充宗作略說田何所傳著書盡是矣永嘉之亂諸家盡亡而孟氏闕佚之書幸存當漢之季年馬融鄭眾康成荀爽好費氏學由是費氏大興而田氏說微獨會稽虞翻作注傳孟氏史稱孟喜好自稱譽得易家候陰陽災異書自言師田生且死時枕喜厀獨傳喜梁邱賀以爲妄言喜竟以改師說不得爲博士今觀虞氏所說陰陽消息之序神明參兩之數九六變化之用精變神眇將非田生之傳果有得其祕奥者哉然遺文所存皆零文碎字其大義絕不可得見藉非虞氏則商瞿所受夫子之微言其遂歇滅矣夫學者求田何之傳則唯孟氏此文求孟氏之義則唯虞氏注說其大較也然虞氏雖傳孟學亦斟酌其意不必盡同蓋古人之學傳業世精非苟爲稱述而已故據其同異或發其旨庶治古文者有考焉孟氏卦候消息惠徵士爲易漢學旣發明之故不具著儒者皆言鄭康成始以彖象附經漢志易經十二篇施孟梁邱三家則章句宜以十二篇爲次今推其文經亡者率無象象蓋後人寫者依鄭氏附著之邪抑其本固然也姚氏釋文敘錄云姚信字德祐吳興人吳太常􅀸注易十卷又引七錄云十二卷字元􅀡隋書志亦十卷吳興志有姚德祐文集輯易注爲一卷明人爲之甚疏略今補而正之余治易始虞氏以其說見于集解者視他家爲多猶可參校而得其義又商瞿之傳至漢末而絶唯虞爲孟氏學七十子之大義儻有存者故樂得而攷之旣巳玩其遺文略得其義例則益知易道消息雖馬鄭大儒未能見之者以費氏徒出經文非有師古說夫子之微言有所閟而不發故也則又竊怪孟氏之傳在吳虞氏五世傳業不絕而漢魏之閒未有爲其學者及仲翔之注旣上爲世所推亦未聞有聞風而起者又以知時俗所尙在彼不在此卒使虛空之儒得逞其說經學歇絕良可悲也其後觀蜀才注卦變之法與虞氏同而未得其本翟子元者時有所合而未詳然皆孟氏之支系也最晚乃讀姚氏注其言乾坤致用卦變旁通九六上下則與虞氏之注若應規矩元􅀡豈仲翔之徒歟抑孟氏之傳在吳元􅀡亦得有舊聞歟惜其所傳者止此無以證之自商瞿受易三百年而至田何田何之傳四百年而僅得虞翻虞翻之後三百年而亡其略可見者姚信而已耳翟子元蜀才而已耳故吾于三家之書雖闕文殘字不可比義猶寶貴愛惜紬繹而不敢忽者也翟氏陸德明云荀爽九家集解有翟子元子元不詳何人爲易義釋文雖時引翟文而敘錄不列子元易義則知德明未見其書特就九家集解引之李鼎祚集解有翟元翟元蓋卽子元李書諱元爲元鄭元字亦如此其所集亦自九家可知二書之外未見有引子元易者德明稱九家集解序有荀爽京房馬融鄭元宋衷虞翻陸績姚信翟子元若以當九家者然李鼎祚旣引九家又別自引翟元則九家非此九人元朗亦云其注又有張氏朱氏則不以九人爲九家亦可知也或又謂九家者淮南之九師荀爽爲之集解今以李氏所引九家之文往往指釋荀注則九家解荀非荀解九家又明要之九家所以述荀而旁引他家以證成之觀子元諸文皆與荀義相近則其采自九家又益信然子元之易蓋孟氏非費氏何以言之荀氏有卦變無爻變今子元於泰則云五虛无君二上包五於姤則云九五遇中處正此皆虞氏之義與荀氏殊故知子元爲孟氏易也依九家序所次子元之生必在虞後其與元􅀡蜀才未知後先若其書固已升孟氏之堂而未入其室可以差肩于姚俯接于范矣漢魏易家如此者不多得而亡之最早可知輔嗣注行馬鄭荀義猶不甚相遠世儒尙或傳之最深怪而屏棄之者孟氏諸家之說也蜀才氏蜀才者七錄云不詳何人七志云是王弼後人謝炅夏侯該云是譙周顔之推陸德明以爲范長生也長生涪陵丹輿人一名延久又名九重又名支字元夀隱居靑城山李雄卽成都王位長生乘素輿詣雄卽日拜爲丞相尊之曰范賢故又名賢釋文敘錄隋唐志皆云蜀才易注十卷蜀才之易大約用鄭虞之義爲多卦變全取虞氏其不同者剝爲師叏爲同人此蔡景君剝上九爲謙之義推其意蓋以剝爲師師爲比爲乾之消息叏爲同人同人爲大有爲坤之消息于虞氏旁通之義則未槪聞然剝叏下降師同人上升窮上反下其序猶有合者非李挺之之復姤五變而生剝者所可口實也京氏漢易家兩京房太中大夫京房者淄川楊何弟子梁邱賀所從受易者也無書元帝時京房字君明東郡頓邱人本姓李吹律自定爲京氏受易梁人焦延夀今所謂京氏易者也釋文敘錄京房章句十二卷又引七錄云十卷錄一卷目隋書志云十卷京氏占候書隋志十種凡七十三卷唐志五種二十三卷其見于史傳有遺文者曰易傳曰積算曰飛候曰易占曰易妖曰易數曰風雨占候其存者積算易傳三卷雜占條例一卷延夀自言嘗從孟喜問易房以延夀易卽孟氏學孟氏之徒翟牧白生不肯曰非也及劉向典校書考易說以爲諸易家皆祖田何大誼略同唯京氏爲異儻焦延夀獨得隱士之說託之孟氏不與相同然七略猶著之曰孟氏京房十一篇災異孟氏京房六十六篇自君明長于災異易家世應飛伏六位六甲五星四氣六親九族福德刑殺皆出京氏然嘗推求漢唐以來引京氏言災異者皆舉其易傳而未嘗及章句至陸德明李鼎祚往往引京氏之文率與易傳大異蓋出于章句將非京氏自以易說災異而未始以災異說易後世之言京氏者失其本耶余嘗善陸績治易京氏而其言純粹與干寶絕不相類如其言雖謂之出孟氏也可使京氏章句而在其不當在陸下章章明矣六日七分卦候消息風雨寒温此孟氏所傳以一行所議京氏法四時卦用事上減九􅀸卦之七十三分則亦其不與孟氏相應之大者惜乎章句之文百不存一京氏之大義亡矣惠定宇易漢學發明京氏積算爲詳余以爲非京氏之所以爲易故不錄占候書而輯章句爲一卷其義例則不可得而說云陸氏陸績字公紀吳郡吳人爲孫權奏曹掾出爲鬱林太守加偏將軍釋文敘錄陸績周易述十三卷又引七志云錄一卷隋經籍志云注十五卷又與虞翻同撰日月變例六卷亡明姚士粦採釋文集解合以京氏易傳之注爲陸氏易解一卷今四庫本是也易傳注世有其書又不宜入易注其所採闕謬甚多今正而補之因論其義例爲一卷公紀注京氏易傳則其易京氏也余嘗以爲京氏旣爲易章句又爲易傳飛候之書以謂易含萬象不可執一隅然則積算之法殆不用之章句以易傳飛候求易者爲京氏者之末失也今觀公紀所述凡納甲六親九族四氣刑德生剋未嘗一言及之至言六爻發揮旁通卦爻之變有與孟氏相出入者京氏自言其易卽孟氏學公紀儻得之耶京氏章句旣亡存于唐人所引者僅文字之末不足以見義由公紀之說京氏之大指庶幾見之公紀以少年與仲翔爲友觀其書亦幾欲與荀虞頡頏矣干氏明姚士粦輯干常侍易解三卷但取李氏集解之文而又時有疏謬丁敎授杰補正之頗詳具今依而錄之因論其例爲二卷干寶字令升新蔡人晉元帝時爲著作郞領國史出爲山陰令始安太守王導以爲司徒右長史遷散騎常侍其注易十卷見釋文敘録隋志又有爻義一卷又云梁有周易宗塗四卷亡册府元龜又云有周易元品二卷史稱寶好陰陽術數畱心京房夏侯勝之傳故其注易盡用京氏占候之法以爲象而援文武周公遭遇之期運一一比附之易道猥雜自此始矣蓋嘗論之易者象也象也者象也易以陰陽往來九六升降上下而象著焉陰陽以天地日月進退次舍而象生焉故曰消息鄭氏之言爻神用事荀氏之言乾升坤降虞氏之言發揮旁通莫不參互卦爻而依說卦以爲象其用雖殊其取于消息一也令升則不然其所以爲象者非卦也爻也其所取于爻者非爻也干支也由干支而有五行四氣六親九族福德刑殺此皆無與于卦者也故乾之爲甲也震之爲庚也離之爲己也此見于經者也于支爲卦象也以甲壬名乾以乙癸名坤見辰戌名艮見己亥名兌則卦爲干支象也以甲子爲水而乾象淵以庚辰窮水而震象姦邪顚倒乖舛說卦之義盡謬矣京氏之義其本在卦氣消息其用在爻變考之其傳及章句遺文可知令升曾不之察而獨取其所以占候者以爲象然則令升之爲京氏易者非京氏也昔韓宣子見易象與魯春秋曰周禮盡在魯矣故易者文王考河洛應圖書革制改物垂萬世憲章周公監之以制作者也鄭氏知之故推象應事周官典則一一形著于易故曰制而用之謂之法舉而措之天下之民謂之事業若乃應期受命革而用師商周之所以興廢固亦見焉今令升之注僅存者三十卦而又不完然其言文武革紂周公攝成王者十有八焉至于禮樂政典亂治之要蓋未嘗及則是以易爲周家紀事之書文武所以自旌其伐也且文王作卦辭而蒙託成王遭周公未濟託祿父不終微子爲客則是易爲讖數之言妖災之紀也故京氏以易陰陽推後世災變令升以易辭推周家應期故曰令升之爲京氏者非京氏也魏晉之代易學中微令升知虛空之壞道而未得其門欲以薉瑣附會之說勝之遂使後之學者指漢師爲術數而不敢道則易之墜令升實與有責焉耳雖然其論法象始于天地疾虛誕之言若邪說豈非卓然不囘憂後世之遠者乎馬氏費氏古文易徒以彖象繫辭文言解說上下經無章句七錄有費氏章句四卷蓋僞託不足信傳之者前漢王璜後漢陳元鄭眾皆無著書有書自馬融始七錄云馬融傳九卷隋經籍志梁有漢南郡太守馬融注一卷亡一疑九字之誤而釋文敘錄及唐藝文志皆有馬融傳十卷孔穎達陸德明李鼎祚引馬融說似俱親見其書不知隋志何以云亡也馬融爲易傳授鄭康成康成爲易注于是費氏遂興然陸德明以爲永嘉之亂鄭注行世而費氏之易人無傳者豈以僞託之章句爲費氏耶荀爽亦注費氏易者其義又特異或者費氏本無訓說諸儒斟酌各家以通之馬鄭荀各自名家非費氏本學也鄭易之于馬猶詩之于毛然注詩稱箋而易則否則本之于馬者蓋少矣今馬傳旣亡所見者僅訓詁碎義就其一隅而反之大抵以乾坤十二爻論消息以人道政治議卦爻此鄭所本于馬也馬于象疏鄭合之以爻辰馬于人事雜鄭約之以周禮此鄭所以精于馬也故錄馬氏之傳著鄭氏所以同異爲費氏學者可以考焉宋氏劉氏三國志注劉表爲荆州牧開立學官博求儒士使綦毋闓宋忠等撰五經章句謂之後定釋文敘錄及隋經籍志皆有劉表易章句五卷釋文又引中經簿錄云注易十卷七錄云九卷錄一卷疑卽所謂後定者也而宋忠復自有著書釋文敘錄云宋忠易注九卷字仲子南陽章陵人後漢荆州五等從事又引七錄七志云十卷隋志則云梁有荆州五業從事宋忠注周易十卷亡忠與衷五業與五等形聲之殊蓋釋文成于隋其時宋注猶在陸元朗得見之隋志據唐時見存則知此書亡于唐初矣然李鼎祚史徵皆詳引之則似未嘗亡者疑不能明也虞仲翔表云北海鄭元南陽宋忠雖各立注忠小差元而皆未得其門今以殘文推之仲子言乾升坤降卦氣動靜大抵出入荀氏虞君以爲差勝康成者或以此景升章句尤闕略難考案其義于鄭爲近大要兩家皆費氏易也然費氏易無變動而仲子注革五云九者變爻則其異于鄭荀者不可得而聞云王子雍氏王肅字子雍東海郡人魏司徒蘭陵成侯王朗之子文帝時爲散騎黃門侍郞稍遷廢帝嘉平中爲中領軍加散騎常侍卒贈衞將軍諡景侯釋文敘錄王肅易注十卷又云作易音而無卷數隋經籍志有易注而無易音或音與注合爲十卷也肅著書務排鄭氏其託于賈馬以抑鄭而已故于易義馬鄭不同者則從馬馬與鄭同則并背馬故鄭言周禮則肅申馬禴爲殷春祭是也鄭言卦氣本于馬則肅附說卦而棄馬西南陰方東北陽方用馬注而改其春秋之文是也馬鄭取象必用說卦是以有互有爻辰則肅并棄說卦剝之以坤象牀以艮象人是也然其訓詁大義則出于馬鄭者十七蓋易注本其父朗所爲肅更撰定疑其出于馬鄭者朗之學也其掊擊馬鄭者肅之學也自馬鄭注行而費氏易興諸家皆廢荀宋雖費氏而宗之者不及馬鄭以馬鄭主于人事而不及易家變動之說也王朗父子竊取馬鄭而棄其言禮言卦氣爻辰之精切者王弼祖述王肅而竝去其比附爻象者于是虛空不根而道士之圖書作矣嗚呼魏晉以莊老亂天下而易先受其禍聖道不亂邪說不興時數會之于肅奚咎哉董氏董遇字季宣宏農華陰人建安初舉孝廉稍遷黃門侍郞魏黄初中岀爲郡守明帝時入爲侍中大司農卒釋文敘錄董遇章句十二卷又引七志七錄竝云十卷隋書經籍志則云梁有魏大司農董遇章句十卷亡攷集解不引董遇則遇書亡于唐初蓋可知遇著書在王肅前故無與肅合者其于鄭荀則多同義雖不可考要之爲費氏易也王世將氏劉子珪氏王廙字世將琅邪臨沂人晉愍帝時封武陵縣侯元帝時爲左衞將軍諡曰康侯釋文敘錄易王廙注十二卷又引七志七錄云十卷隋志唯有三卷殘闕劉瓛字子珪沛國相人宋大明四年舉秀才除奉朝請不就博通五經聚徒敎授常有數十人嘗爲主簿行參軍公事免遂不復仕齊太祖踐祚欲用爲中書郞不受後以母老闕養拜彭城郡丞又除會稽郡丞數除官皆不拜卒諡曰貞􅂤先生釋文敘錄引七錄云劉􅬐作繫辭義疏隋志有劉瓛繫辭義疏二卷又周易乾坤義一卷又云梁有周易四德例一卷亡文選注所引或云易注卽其義疏之文非別有注也而册府元􅀛有劉瓛義九卷董眞􅀸周易會通引劉瓛同人之注皆不足信東晉以後言易者大率以王弼爲本而附之以元言其用鄭宋諸家小有去取而已非能通其說如王廙者是也齊代鄭義甚行史稱子珪承馬鄭之後一時學徒以爲師範其于易或宜宗鄭黜王殘闕之餘無聞焉耳子夏傳釋文敘錄子夏易傳三卷七略云漢興韓嬰傳中經簿錄云丁寛所作張璠云或馯臂子弓所作薛虞記虞不詳何許人隋書經籍志周易傳二卷魏文侯師卜子夏傳殘闕梁六卷案漢書藝文志易有韓氏二篇丁氏八篇而無馯臂子弓則張璠之言不足信丁寛受易田何上及馯臂子弓受之商瞿非自子夏則荀勖言丁寛亦非劉向父子博學近古以爲韓嬰當必有據儒林傳稱韓生亦以易授人推易意而爲之傳不聞其所受意者出于子夏與商瞿之傳異耶今所傳子夏傳十一卷崇文總目云十卷以釋文集解諸書所引校之都不相合晁以道云是唐張弧所作惠徵士棟以爲唐時子夏殘書尙存無容僞爲爲之必宋人也然予謂卽唐時二卷者亦非眞韓氏書其文淺近卑弱不類漢人殆永嘉以後羣書旣亡好事者聚斂眾說而爲之也朱子發云孟喜京房之學大要皆自子夏傳而出此不察之言也孟京之易傳之商瞿豈得出于子夏哉子發又以七日來復傳證京房六爻之義以井谷射鮒傳證井爲五月之卦固有合者要之爲傳者取于孟京非孟京取于此傳觀其文意可知也然晁以道云二卷之書不傳而漢上易傳所引皆非十一卷之僞書則似朱子發見之者其復出于晁後耶而又何時亡之又不可曉也易緯略義序緯者其原出于七十子之徒相與傳夫子之微言因以識陰陽五行之序災異之本也蓋夫子五十學易而知天命子贛曰夫子之言性與天道不可得而聞是以其可言者六藝之文著之其難言者游夏之徒或口受其傳恉益増附推闡以相傳授秦漢之閒師儒第而錄之其亦有技術之士以其所能推說于篇參錯閒岀故其書􅄂而不能醕劉歆之于緯精矣當其時河洛之文大備而七略不著錄將以符命之學出于其中在所禁祕耶鄭康成氏漢之大儒博通古文甄錄而爲之注則緯之出于聖門而說經者之不可廢也審矣至隋而六經之緯焚滅唯易獨存後漢書注載其目曰稽覽圖乾鑿度坤靈圖通卦驗是類謀辨終備宋而更有乾元序制記乾坤鑿度宋之諸儒排而擯之訖于元明無傳于世存者獨明永樂大典所編而緯無完書矣竊嘗以爲乾坤鑿度僞書也不足論乾元序制記宋人鈔撮者爲之坤靈圖是類謀辨終備亡佚旣多不可指說其近完存者稽覽圖乾鑿度通卦驗稽覽圖論六日七分之候通卦驗言八卦晷氣之應此孟京氏陰陽之學乾鑿度論乾坤消息始于一變而七進而九一陰一陽相竝而合于十五統于一元正于六位通天意理人倫明王度蓋易之大義條理畢貫自諸儒莫能外之其爲夫子之緒論田楊以來先師所傳習較然無疑至其命圖書考符應算世軌則其傳湮絕文闕不具不可得而通亦非達士之所欲說也故就三書而求其醕者通卦驗十三稽覽圖十五乾鑿度十八易學蕪絕漢人之書皆巳亡闕其僅而存于今足以考古師說如此三書者治易者蓋可忽乎哉故條而次之以類相說通其可知者闕其不可知者存其義略焉爾詞選序詞者蓋出于唐之詩人採樂府之音以製新律因係其詞故曰詞傳曰意内而言外者謂之詞其緣情造耑興于微言以相感動極命風謠里巷男女哀樂以道賢人君子幽約怨誹不能自言之情低徊要眇以喻其致蓋詩之比興變風之義騷人之歌則近之矣然以其文小其聲哀放者爲之或淫蕩靡曼􅄂以昌狂俳優然要其至者罔不惻隱盱愉感物而發觸類條鬯各有所歸不徒彫琢曼飾而巳自唐之詞人李白爲首其後韋應物王建白居易劉禹錫之徒各有述造而温庭筠最高其言深麗閎美五代之際孟氏李氏君臣爲謔競變新調詞之雜流由是作矣至其工者往往絕倫亦如齊梁五言依託魏晉近古然也宋之詞家號爲極盛然張先蘇軾秦觀周邦彥辛棄疾姜􅇪王沂孫張炎淵淵乎文有其質焉其盪而不反傲而不理枝而不物柳永黃庭堅劉過吳文英之倫亦各引一端以取重于當世而前數子者又不免有一時通脫放浪之言出于其閒後進彌以馳逐不務原其指意破碎奔析壞亂而不可紀故自宋之亡而正聲絕元之末而規矩􅈥五百年來作者十數諒其所是互有緐變皆可謂安蔽乖方迷不知門戶者也今第錄此篇都爲二卷義有幽隱竝爲指發庶幾塞其下流導其淵源無使風雅之士懲乎鄙俗之音不敢與詩賦之流同類而諷誦之也丁小疋鄭氏易注後定序自王弼注興而易晦自孔穎達正義作而易亡宋之季年學者爭說性命莫不以王孔爲本雜以華山道士之言而王伯厚氏獨盡心鄭注蒐輯闕佚彚爲一書可謂偉矣自是之後蓋五百餘年而得惠定宇氏始考鄭氏爻辰增補伯厚集注所未備然後天下知有鄭易又數十年丁君小疋從而定之正其違錯補其闕漏次其篇章然後鄭氏之易大略具焉方今士以不習鄭學爲恥其考校鄭書者無慮數十家而以丁君此書爲最善蓋其始爲以至于今二十餘年不苟成書有爲其學者必咨焉從而爲之校者以十數唯以傳信爲務而不以臆斷其爲之也勤其出之也愼則其獨善宜也宜夫學者所以貴古書者豈唯其文哉將有取其義也王伯厚氏之序此書取朱震之言曰多論互體曰以象數爲宗夫易之有互不始鄭氏自田何楊叔以來論互體不足爲鄭學也易者象也易而無象是失其所以爲易數者所以筮也聖人倚數以作易而卦爻之辭數無與焉漢師之學謂之言象可謂之言數不可象數竝稱者末學之陋也吾以知伯厚之于鄭易槪乎未有聞也定宇氏說爻辰是矣雖然爻辰者鄭氏之所以求象而非鄭氏言易之要也鄭氏之學盡于爻辰而巳乎記曰夫禮本于太一分而爲天地轉而爲陰陽變而爲四時其降曰命韓宣子見易象曰周禮在魯矣是故易者禮象也是說也諸儒莫能言唯鄭氏言之故鄭氏之易其要在禮若乃本天以求其端原卦畫以求其變推象附事以求文王周公制作之意文質損益大小該備故鄭氏之易人事也非天象也此鄭氏之所以爲大而定宇氏未之知也以王惠二家之學如此則其所輯往往有牴牾而不知者非其學不博識不精其所涉淺也丁君此書余見其稾本一字之異必比附羣書以考其合往往列數十事是故于義審于義審則其分別有序也無惑爾己余往嘗疑鄭君箋詩以婚期盡仲夏以前于經無所徵驗及就歸妹之注考之六五爻辰在卯二月中辭曰帝乙歸妹以祉元吉九四爻辰在午五月中辭曰歸妹愆期然後知箋義蓋出于此又嘗疑雷震百里以象諸侯周官制則不合及讀晉康侯之注諸侯有三捷之功錫以乘馬而廣之然後知易有三代之制其他如此者甚眾惜乎唐之儒師未有見及此者遂使禮家微言泯没而不傳也然就此書而求之比類儔物以合鄭氏禮注則于易之大義未嘗不有考焉是則小疋之功不可廢也夫畢訓咸詠史詩序古之爲學非博其文而已必有所用之古之爲文非華其言而已必有所行之必其有所用則二帝三王周孔之道如工之有矩不可以意毀也必其有所行則發于中而有言如鼓之有揨不可以外遏也嗚呼今之學者其取于古也略矣其取于己也詳矣六藝之書仁義禮樂之迹習之矣弗求明也明之矣弗求通也通之矣弗求得也故曰其取于古也略爲時文爲辭賦爲詩以集名者比屋可數下者以爲名也上者以求傳于後也就其名而傳焉者不可以論是非不可以考治亂而其言也不可止故曰其取諸己也則詳雖然今之世之所謂達于用者吾見之矣必其悍然無忌憚者也其共笑爲迂者則必稍嘗學者焉笑之甚則必其學愈甚者焉今之言之所謂周于行者吾聞之矣必其惛然無廉恥者也其共怪爲謾者必言之稍文者焉怪之甚則必其文愈甚者焉嗚呼吾不得見古之學矣吾不得見古之文矣其有學古之學爲古之文者將惡乎用之而惡乎行之吾友畢訓咸于古無所不學志足以立事才足以致務而其狀悛悛如鄙人雖與之游者莫能測不苟爲文唯作詠史詩百餘篇捊譏成敗斟酌道理皆有條驗嗚呼以訓咸之文求其所學其有所用而行之也審矣世方迂訓咸則孰知此詩之非謾乎南華九老會倡和詩譜序吾友莊達甫授余以南華九老會倡和詩譜余讀之終篇乃言曰是九人者生皆同族皆仕焉而老其仕皆有淸節又皆能爲詩其不及會而屬和者二十一人又皆耆德嗚呼可謂盛矣蓋吾聞乾隆之初國家太平之澤久物力舒給百姓安樂夀考其君子惇行上禮廉恥爲務苟賤嗜利者不齒于里黨而莊氏子吾鄕爲故家科第仍顯文章行誼冠冕士類觀于斯譜則諸君子所以沐浴世澤耄期稱道者豈獨莊氏之幸歟昔者先王致天下之士與之治百姓然七十而致政歸老于鄕里豈不以敎民知恥勸讓安老者哉其老者則非佚息而已必以時坐左右塾敎其里之子弟大夫謂之父師士謂之少師民志之不壹孝弟有弗達惰于農桑而薄于友助責在父師少師于是臘月農功畢餘子入塾黨正以鄕飮酒之禮致民于序而正齒位杖者爲賓父師少師爲僎皆與獻酢之禮旣成旅而乞言相與歌詠古聖之道歸美于上故詩曰朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬夀無疆先王所以正人倫厚風俗仁夀一世恃有此道也今去九老之會五十年矣其老者猶及見前輩之盛德其少若壯者蓋無聞焉然則由今以後鄕人子弟景頌先烈世遠愈不及將何所考正而傳道者哉此達甫之譜所以不可不作也達甫爲九老中南閭翁後人篤學力行克世其美嘉慶元年詔郡縣舉孝廉方正邑之人以達甫應大府上其名擬召用達甫固辭吾以爲鄕之先生皆如九老鄕之子弟皆如達甫庶幾哉吾鄕之人士膏澤聖世之化休問盛事將不絕于來茲矣遂書而爲之序嘉慶三年月日莊達甫無名人詩序往余讀高士傳以爲古之君子懷貞負和不得已而與世相接猶深自匿晦或名不可得而聞則夫高巖窮谷之中終己不通于世者豈少也哉惜乎其不得盡傳之也旣而思之古之高世之士非苟以身儕麋鹿而已若許由善卷披衣齧缺之倫親爲帝者師及三代之衰沮溺丈人荷蕢之屬乃有激而逃焉者然許由洗耳巢父牽犢披裘公反裘負薪荷蕢之流通言于孔子彼雖隱其光藏其形亦未始不欲自見以傳于後孔子曰君子疾沒世而名不稱焉然則君子雖遯世或者無終晦于深巖窮谷而不得一接其名者耶孔子作春秋以名爲襃貶故有求名而不得有欲蓋而名彰然如齊之太史氏秉筆爲道兄弟赴義若飢渴絳縣老人晉之重人聲動公􅀸而史不能道其姓氏則又以爲古之君子者雖其有稱於後蓋亦有幸有不幸而況其名與事俱泯焉者又可勝道哉司馬遷曰閭巷之士砥行立名非附靑雲之士烏能施于後世悲夫有以也吾友莊達甫次古君子之見于傳而佚其名者自上世迄周凡若干人頌之以詩爲一卷達甫今之砥行立名者又毎有高世之志昔者揚雄論德名以鄭子眞楚兩龔嚴君平爲庶幾而班固作史以王吉貢禹鮑宣兩龔與四皓鄭嚴同傳蓋明出處之同科隱顯之一致也達甫之爲此豈曰以慕夫鴻飛冥冥之爲徒者哉遷改格序易之象曰風雷益君子以見善則遷有過則改解之者曰君子謂乾也益之初否之上乾也其四否之三坤也坤進而居乾是謂遷善乾降而正坤是謂改過改過之道不可以不重也如雷然赫乎其動之也遷善之道不可以不輕也如風然泠乎其入之也故曰益動而巽日進无疆此君子所以終日乾乾夕惕若夤者也君子之學始于自知而訖于自成始于自知者能見善與過之謂也非所善而善是謂􅆫非所過而過是謂誣誣且􅆫君子雖自反其能益乎夫決嫌疑定猶豫別是非舍禮何以治之故禮者道義之繩檢言行之大防進德修業之規矩也君子必學禮然後善其所善而過其所過益之初曰利用爲大作大作國之大事祀與戎也其二曰王用亨于帝亨者祀也其三曰益之用凶事凶事喪也其四曰中行吿公從吿公朝聘之禮也利用爲依遷邦言大封也故吉凶軍賓之禮具于益焉君子于以考善于以鑒慝是之謂自知訖于自成者無吝于始無怠于終變動不居而常執其貞無吝于始者益之初復也復小而辨于物旣以辨之君子不如是則不樂故傾否先否後喜也無怠于終者益之成泰也乾動而下坤動而上乾德也坤業也業日進而照之以德光故曰自上下下其道大光也變動不居而常執其貞者益之用旣濟也不正不益故曰或益之十朋之􅀛永貞吉离􅀛也兌朋也貞正也言三正离而下益兌也其在上曰莫益之或擊之立心勿恆凶莫益之者上不來也或擊之者初將壞也立心勿恆者巽爲坎濟未泰也夫時者有變而禮無不宜君子務正其道正其道而勿有守之以恆是以大通易曰損益盈虛與時偕行此之謂也吾友莊君􅀸􅃢寡言而力行好學不倦與其同志陸君紹聞取明人功過格正之以禮明其統例名之曰遷改余以爲君子之學所以異于釋氏者唯無求其報應福利而已非昧昧于善惡之輕重而曰吾明道不計功也􅀸􅃢之爲此其諸以爲禮之律令與故爲說易之言遷善改過者以序其篇茗柯文二編卷上終茗柯文三編蕉花賦并序阮司農座主小嫏嬛仙館有蕉花一枝命惠言賦之維江南之名卉有蕙圃之巴苴裁縹玉以爲葉舒靑霞以爲荂揚翹葳蕤樹萼浛淡夫容發波到植䓿􅣿擢孤榮以四照苞㴱房之密掩馨囘綠以風轉芳滋紅而露湛于時朱炎曜夏素晷移秋芳草欲歇繁英旣收心百重而獨展葩千番而遞抽旣榮朝而萎暮若昔逝而今遒諒榮萎其迭運何今昔之相侔奉君子之昐睞效弱植於軒墀豈華豓之敢飾幸芳臭之在滋感蘭蕙之早晏念蘅杜之相違恐秋風之易落惄芳洲之未歸馳淸暉而結思恆百卷以爲期亂曰赤巖山前路以遠扶荔宮中日以晩願持兮素心報眾芳兮九畹館試靈臺偃伯賦以功成奏凱民悦無疆爲韻儀昔三五仁洽道豐曷聞無誅而治達不殺而化隆是以師貞大人雅美車攻􅀖典九伐軍資五戎皇奮厥武帝謂是通電擊霆震龍翔鳥索之招搖之下行乎太乙之中三曾而名大武七德而奏膚公迺反齊斧挂敦弓倡愷樂以偃武登靈臺而課功瞻彼靈臺之爲制也丙己奠位房心曜精前明堂之赫赩帶璧水之渟濚眇傑搆而聳出象漸臺與蓬瀛保章是書雲物馮相以測機衡察五是之來僃考三階之泰平于時釋奠儀具獻馘禮成囘戎輅萃輕苹仿偟乎靈囿而升乎高臺之嶢崢進蓐收使受鉞屬勾陳而洗兵維彼師節曰伯是名義在止戈禮先偃旌惟夫伯也者纁縿上陞華芝下覆絳素殊表緇靑各副弧旌枉矢朱鳥白獸八方維中六甲句戊九七四六前左後右指揮則波騰擺亞則飆驟囘皇則天旋掣曳則山仆司幄機而爲目運奇正而相首聲金鼓之和響聞笳管之淸奏當夫鵝鸛朝弦豼貅夜鎧陳壓崩雲鋒驚立海􅁚弭魚須厹矛鋈錞百金之士鴻麗十快之雄鵠待司常分旗卒閒斯在北風吹而獵獵流波縈而浼浼軍威奮士氣倍摧蒙茸刊嵬翕張而萬騎矞皇軫轉而三軍錯璀一麾翩如再接厲乃故能蹴秦望于埃墟掃楚氛以木櫑使卷舌反踵岐頭植䰂莫不崩角稽首掑頤樹頦望茶火而愓息與蟲沙而腐鮾受降則積甲齊山振旋則執同聽凱故其偃之也解飛旓脫維紃褫垂斿之旖旋袪綢杠之輪囷收龍章之煥霍卷虎畫之斒將遂剖提鼓碎金錞埋暢轂破文茵倒干戈而卻載耜騏􅑓干閒畛朝無冠鶡之將野無服劒之民豈徒銅虎銷其符璽身璋毁其齟齗于是八荒來庭九有有􅎒西傾順軌東鯷案轍三光宣精十煇時節罰質芒寒欃槍燿滅北落之陳虛懸南軍之門空設考靈燿之休徵樂符瑞之章徹聽鐃吹而朋怡仰天衢而曹悅爾乃司馬執法太史陳符觀天人之協應覽萬國之有無僉以爲皇上仁育義正恩洋澤濡有不率化天戈是誅所以追來孝于陟降播柔武于寰區䲔鯢旣翦封狐旣除自我天覆弗震弗渝文威赫其廟算承烈訏其顯謨葢鞬櫜命于姬氏干羽陳于有虞雖自古而爲昭殆方今而未兪也遂作頌曰於赫聖武威謀孰亢我奮我師我伯央央於昭聖文惠風溥翔我還我師我伯洋洋皇在靈臺苞符孔彰我伯旣偃與民共慶乃流璧雍遂開明堂於千萬年惠我無疆館試蜡賓說禮賦以岀游于觀之上言偃在側爲韻有講藝公子問于翰林主人曰葢聞德者道之失禮者德之逸治化之與氣運若漸于淖而汨焉動以遠則騰而軼矣何以稽諸汙尊而抔飮者不以燔炙爲飶也營窟而橧巢者不以棟宇爲謐也帝緒王統或繼或述天靑地素一文一質人藏其心神閟其吉是以素王臨兩觀而興歎悼小康之莫必意彼六君子者葢將終古而不岀矣夫主人曰吁豈有是哉若客所言則是唐嬀道不卓而姬姒治不休也泰山之封何儀七十有二而未遒哉往者周綱旣解王澤卽幽簴弛其系絻棼其斿十二力政潰潰浮浮孔子雖制作倉黑不代求興于魯麟以次春秋監彼二代亦曰從周故乃原百一之澤明張弛之由寤􅁚魏之明僃志禮敎之優遊俟後聖有作而道罔不侔也盍亦覽方今之治與三代儔乎我大淸之有天下也功邁往紀德隆古初四聖重光以咻以噓民不識帝力厥有政有居作而相胥息而相於其覺呿呿其臥蘧蘧一百六十年有餘矣是以禮樂旣僃而民用燕譽也我皇受之振天紘斡地榦握乾符衍坤算有孚在上中正以觀赫風雷之眒屬爛日月之淸晏然後捜薪槱于旱麓載羣雅于雲䍐懸旌設㲈執簡奉翰皋棄之徒思日贊贊倫魁能冠相與列乎殿陛者若日煇而雲縵也陬澨之域飮食衎衎領引目盰相與屬乎輪轂者若掌眎而指按也夫其顧諟明命昭假不遲天地爲本事則舉之乂暘肅雨仁敷義施孰柄孰端陰陽四時考朝究夕爲畢爲箕日月從星事公不私恩開威閤生殺互倚鬼神五行是復是司頒憲飭典陶軒育羲禮義爲器情田以治馴梟革獍纓羈絡縻比于四靈胎天可窺于是仲冬日至中孚信養萬物權輿于下赤萌于上大報本以反始恭圜丘之烟煬爰嚴父以躋配荅五精之嘉貺爾乃孤竹諧奏雲和高張器用陶匏齊列秬鬯六變旣畢百靈時嚮神明肸蠁閶闔詄蕩嘉無斁于對越駿奔走乎顯相維皇情之庭紹瞻陟降而載愴夫聖人之德何以加于孝乎孝者禮之門也治之源也是以六合祇德九㝢庸恩外坼八埏旁暢無垠鷙蟲囘面而内向鳺舌革響而棲樊楚氛旣靖秦弧載鞬舞虞干之奕奕陁崇墉之言言足使枳頭交踵之國結胸儋耳之蕃戶皆封而不閉壤可游而罔諐然而聖主猶孜孜勿寕篤近舉遠屏符瑞之彪炳卻雅頌之赫煊成周之櫜旣建靈臺之伯斯偃興舞七德議禮三本酌中尊于四衢刈眾芳于九畹功不見其所事俗不知其所返物生其共人貢其悃斯古之所謂大順道積焉而不苑者已故曰聖有前後道無咎悔苟符節之能合實今古而相待尼父刪述六經載采漢初萌芽唐猶傀儡宋學刓其圭璧明制遺其鼎鼐更降迭替越二千有二十載而後大道之行于此乎在也豈非百世可知而聖言非紿歟客旣飫于至道飽乎帝則炯乎若覺攬乎若得作而曰美哉德也雖謨典所敕河洛所式方斯恧而昔嘗恨不逮夫帝世聞斯論也其置身大庭之側矣請終身誦之剖禮說者惑也館試匠成翹秀賦以入學庠序以脩彜倫爲韻於皇時聖厥中允執重光乃宣神武載戢紘天綱以遐覆繘井收而用汲興三雍之上儀開二酉之祕笈雖葑菲而必采孰椒蘭之弗緝執經則圜橋俱觀􅈼俊則四門竝入維作人之雅化木因材以登擢樂有儀于菁莪謝無成于郁樸度千章于杗桷熟百穫于稰穛稽葛洪之遺論覈淮南以研㩁譬翹秀之殊材待匠成于採斲鈞鴻規于大造施尺度于末學若夫徒洲竹箭之藪荆衡卉木之場卑枝雲構靡榦風攘猗儺接畛淖汋連岡必勁質之能植斯翹然而獨揚百圍殊于樗散七年識于豫章江漢則爲杞爲梓終南則有紀有堂信高標而自賞羌拔類以爲良擬官材于造士最羣倫于膠庠至于春相期秋實堪佇英三擢而爲芝穟下垂而􅁚黍幽蘭時菊之標玉的金莖之侶繄無言之孤秀洵不暱于野處揚紛葩于紉佩美嘉薦于筐筥流左右于荇菜鬱條鬯于秠秬似英華之初發始譽髦於術序於是􅃟公輸命王爾量修輪度丈咫搜根柢而呈嫮約鉤衡以效伎運精心以司契順眾材而程美規圓象天準平法水標􅀡從繩分弧綴矢理正雲披文奇波詭庀工而任則棟梁成器而珍維簠簋胡取裁而必當諒匠心之有以至其養芒角培萌勾􅀨㴱葉茂風暖花柔滋九畹而將刈服三時而待秋被厚澤之旣渥誦厥壤之可游掇遠芳於叢薄攬孤馨於道周故使薜芷不閟于湘沅蘋藻見取于公侯實受成於亭毒豈資媒於蹇修是知維木有翹皇則匠之維草有秀皇則成之苟甘白之可受自追琢之必施問彌綸于上縡胡帝則之能窺千林擢枝以爭拔百卉抽穎以效時松無心而干日葵有意而傾曦冀􅀨露之必及緬矩矱以爲期又孰知匠氏何以用其斧削鬰人何以齊其尊彜然而聖風有自至教易循五品先于孝弟六行終于睦婣因物付物以人治人猶眾木殊材而規榘同其曲􅀡百卉殊氣而芳臭和其甘辛斯靈均可得而佩匠石可得而掄則夫聖天子使天下沷濯摩厲懷材貢珍不識不知而臻大化之湻者豈非學校之化陶冶于人倫也哉館試天以爲正周以爲春賦以麋角解蘭根出泉水動爲韻天道神運聖人奉時維三微之漸著乃三統之初基雖迭取于紐引實孕始于荄滋考日景于南陸候緹灰于北維陰初藏于屈蠖陽未觸于童麋是爲天正之首而周月以之原夫二曜重麗五星高晫黃赤殊其纏表東西互而超趠粤有星紀是爲天朔牽牛之初其道有倬起經維而肇緯度引觜觽而絡辰角䢈曟則斗振于天紀􅀊則復生于剝星囘杓而再建日周次而方罷擬規壁之有合譬連環之不解端天心于專􅀡齊乾則之闔捭陽周神而無倚物權輿而弗駴斯牝馬之所以行于地中而潛龍之所以信于溟澥也是以握先述氣中孚爲端甲子初正九六相摶滋黄宮以信養感赤􅁚之生難􅃸乍分于土炭氣先入乎芸蘭七十三分而坎效六日七分而震完蓋天所以爲宙合之橐而正夫七始之囘環周人取焉改月紀元標微陽于嵗首建春序于天根合貞元于易􅁚脫罔􅀡于元門冰終時而有始日萌艸而猶屯旣孳生而子應固蠢動而春原帝非愆于出震時適會于終坤爾乃表月次王統正號吉定朔􅃸于夜半協陽光于日出天子居靑陽而聽政太師抱黄鐘以調律六官先至日而和典五史編首時而載筆葢用九以倡八六體一以四七故正時不以歸􅀊之餘而陳風特以稱日之一且夫正朔三改文質再旋順三才以爲序實百王所同然軒轅以尙赤爲統虞嬀以建子爲年夏規殷革商紀周遷竝改時以命月明稽古以同天故知春氣雖成于靑陸春陽先動于黃泉此尙書有伏勝之說春秋有陳寵之傳然而正嵗記于周官汁月聞之虞史雖成正於天統實不易于人紀美夏數之得天驗盛德之在水候五日之結蚓佇三朝之瑞雉所以順造物之生長一百姓之聽視葢尼父所以禪周正考三王而合揆者也我皇上熙績欽堯道經演孔正乾坤之敘執天人之總授時則卦取大來推策則爻先反動八能之氣旣調三素之雲常滃雖復寒溫測于孟京占步推于焦董不啻指春工于條末窺天􅁚於筦空何足以識三十六宮之往來百七萬里之帡幪也哉館試大愷樂賦以飮至云畢告㨗在兹爲韻皇帝嗣位之六年文德旣盈武節斯稔掁兵釋旅作大愷之樂以功薦于太寢禮也八荒四埏萬類千品枉繩邪匡道履度稟囘囘焉淰淰焉聆奏者神繹撫節者志懍若諧箾韶之成化可遊而和可飮也粤我大淸之有天下照之以日月容之以天地恢之以久大成之以簡易芸生之屬靈蠢咸遂譬繁林之翳而鸞鴞竝棲膏土之沃而薰蕕共植遂乃有苗弗率防風後至義千斧鉞之誅罪甚市朝之肆聖王閔焉乃詔太尉進司勲厲勁卒勒雄軍靜若山岳動成風雲簡不率敎者而誅之若薙氏之艾耘然猶解亳津之􅅈戒崑岡之焚兵以撫戢爲治令以寛大爲文優柔夷愉使其囘面而内向是以厯五載之乆而曾不急摧枯朽以斧斤葢崇墉有臨衝之肆虞階有干羽之勤曾未足以云也是故豚魚孚駭豕謐墉隼殲穴禽出秦壘刊楚氛失天戈囘武功畢振軍容以入國執世俘而數實歌杕杜以勞勩賦岀車以勤恤念七德之武志本十全之善述懷天保與采薇始憂勤而終逸將偃伯于靈臺必吿成于太室命太師以執同聽軍聲而爲律于是岐伯后䕫制氏之倫僉爾而進曰昔者黃帝揚德建武軍樂造焉越周武王得意示喜愷歌吿焉鎛師以晉鼓節奏眡瞭以編鐘合操司馬秉鉞而先獻樂師播詩而倡導漢歌有短簫之曲晉制􅆓鼓吹之號艾張雅麗而不典巴渝粗奮而近虣惟我皇上緝熙重光道洽義浹懷繩者被其濡煦背矩者懾其震疉故禮敎以爲綱阹兵刑以爲調燮所以化其不臧而弭其不協非以嘉戰功而多克捷也宜開徵角之宮啓英莖之笈詩天保之單厚進人舞之蹀踕頌皇武之耆定昭聖文於奕葉遂拜手稽首而進樂章曰於鑠皇武載民之采九州攸同外薄四海昔我岀師梟獍是醢今我振旅頑獷是改彼頑者梟歌舞斯在豈惟戰士實樂以愷惟皇之功以永千載於昭聖文奉天之時五載不遑恩潭澤滋昔我出師謂民顚危今我振旅由庚有夷彼危而夷孰扶孰持下謀之風不其在兹惟皇之成以永無期館試龍見而雩賦以爲民祈祀大雩帝用盛樂爲韻於惟聖王徵用驗事八風吿期五是來僃曰暘暘敷曰雨雨施雖休和之時效猶艱閔之余毖匪民曷勤匪穡曷爲稽春秋之盛典觀昊穹之昭示粤以孟夏丙辰舉常雩之祀于郊社禮也于時恢台肇􅃸景風協辰赤德方曜蒼精謝竣天田輝輝而照耤牽牛煜煜而臨畛維龍火之初見吿農期于萬民乾爻純而天飛震氣究而淵申實風􅀨之所奉識膏澤之將新爾乃太史􅃸于天部宗伯詔于王闈命稻人以供斂詔視祲而觀煇童冠釁浴而興舞肆師表器而揚微音官涖縣而畢具􅃁宰誓戒而莫違令先庚而先甲義有報而有祈各展采以錯事用昭䖍而受禨天子乃以陽􅏯僃大駕揚瓊繠鳴和鸞軾玉几以卽于齋宮湻濯食玉儲精垂祉駕斗車之威麗建招搖之颯纚左靈星而右辰角驂農丈而服夭耜超房駟而逾邁排閶闔而􅀡指儼對越于蒼縡表敬㳟于禋祀圜靈􅆄蠁五位晻譪邸陳四圭樂變六會金版吿蠲玉鬯芬馤皋搖太一猋爥華葢豐隆躨跜以屬衡屏翳儼翼以承斾廓盪盪而合莫信巍巍而兩大且夫聖皇之動民也撫時爲柄與神合符先東作而省嵗後西成而慮無張昏中而黍種農晨正而土渝伊詢箕與課畢若望杏而瞻蒲故其事天也南郊用北陸而爲􅃸明堂驗辰角而非誣始耕旣重啓蟄之禘而祈祀復尊龍見之雩是以農舞于疇時報之嵗辰二十八而不愆雨三十六而可計驗三階之泰平察五緯之高麗占太陰而常稔測元枵而虛繫韙錫福于我后實奉若于古帝遂乃欃槍靖氛旬始埽雺白虎敦圉而成罰鶉鳥戢翼而弗縱我澤無私民樂與共鑄劒㦸而爲耜翦榛荆而播種占壤則十二次而無隔隩塸通蜡則七千里而均諧豳頌斯聖人所以奉三辰大一統泯聲臭于合載兼覆幬以爲用者也遂作頌曰惟聖若天惟天佑聖懸星表時實槱效敬維雨之膏維祀之慶人若其疇物正其性時乘六龍曰德之盛皇來祀雩有殷其樂黃鐘大呂升霄降邈皇旣雩止有渰其渥祁祁斯甘穰我稰穱屢維豐年皇武攸晫散館大禮與天地同節賦以四海之内合敬同愛爲韻懿惟聖王立功立事旣耆定于武德爰醇鬯于文治表烈承而謨顯體乾大而坤至紹宗伯以典禮敷時夏而攸肆昭物則于上下法易簡于天地成位則才乃參三居體則支宜暢四原夫天地之精是曰眞宰經星辰而運日月奠維躔而橐山海行以錯而不棼氣以殊而不改陰陽以消息而不竆剛柔以成形而不倍政莫詭乎璣衡步難竆于豎亥自非有節于一元曷以爲昭于億載惟夫禮也者因人情而作制統物度以爲規一視聽于耳目固腱會于膚肌旣繩準于一世乃品節夫二儀識財成于后以兼天地而官之故其尊卑殊施高下作對譬氣形之升降均事功于覆載威儀興俛冕弁藻繢比文理之質􅁚垂賁飾于草昧吉凶相權生殺互代似嚴温之迭乘道竝行而不悖紀綱周詳品庶咸乂擬圜方之範圍籠萬彚于形内至其内心外心體物周帀天端地倪爲訢爲合從隆從汙時物相雜天盈地虛一闢一闔順摭經等規重矩沓天施地生昭晰竝納升中降禪春欷秋欱天蟠地際煦嫗相答葢嘉會者天地所以賦性行異者人君所以興盛必制節而不過乃保合而各正樂以順禮而敎和禮以防樂而居敬旣反此而爲刑亦布兹而爲政是以八荒一志萬國齊風竝傾心于帝則咸歸極于大中彼觀型于􅁚魏若履度于厚穹貞之日用飮食以爲質鈞之道德風俗而皆同又何怪奔駴無驚於罜鹿潛游不化于沙蟲則惟我皇上察地監儀則天與配本身度之昭彰範羣倫之晻曖中和竝致位育咸在耕鑿何知道寶不愛雖復搜逸禮于河間綴遺經于小戴豈足以文盛治之斒喻情田之沽漑也哉原治古之治天下者上不急乎其下而下無所拂乎其上政不令而成獄不省而措其逸也如此其政之施于民者不過嵗時讀法而已是亦今有司之所奉行者也其刑罰之條止於三千五百而以待獄訟常有餘豈今之有司常愚而古之有司常智歟其民與上相接者飮酒習射吹笙擊鼓以爲樂而知仁聖義中和之德孝友睦婣任䘏之行禮樂射御書數之事皆後之學士大夫所習焉而難成成焉而可貴者鄉黨州閭之子弟常岀于其閒其化之湻而俗之懋也又如此葢先王之制禮也原情而爲之節因事而爲之防民之生固有喜怒哀樂之情卽有飮食男女聲色安逸之欲而亦有惻隱羞惡辭讓是非之心故爲之婚姻冠笄喪服祭祀賓鄉相見之禮因以制上下之分親疏之等貴賤長幼之序進退揖讓升降之數使之情有以自達欲有以自遂而仁義禮智之心油然以生而邪氣不得接焉民自日用飮食知能所及思慮所造皆有以範之而不知其所以然故其入之也㴱而服之也易夫蠻粤之人生而侏離聞中國之音則駭而視被髮文身之俗資章甫而無所售彼其習于鄙陋者猶如此而況習于禮敎者其有奇衺放恣之民生其間有不怪且駭屏之而無所容者乎故先王所以能一道德同風俗至于數十百年而不遷者非其民獨厚其理自然也是故先王之制禮也甚繁而其行之也甚易其操之也甚簡而施之也甚博政也者正此者也刑也者型此者也樂也者樂此者也是故君者制禮以爲天下法因身率而先之者也百官有司者奉禮以章其敎而布之民者也度禮之所宜而申之以民所常習故政不煩也權禮之所禁而輕重之以繩不合者故刑不擾也民習于禮故知有是非有是非然後有羞惡是故賞罰可得而用也民習于禮故知有父子君臣長幼上下知父子君臣長幼上下然後有孝弟忠信是故軍旋田役之事可得而使也民習于禮故有孝友睦姻任䘏有孝友睦姻任䘏然後有智仁聖義中和是故其人材成者可得而用也故曰禮止亂之所由生猶防止水之所自來也壞國破家亡人必先去其禮禮不去而風俗隳國家敗者未之有也後之君子則不然不治其情而罪其欲也不制其心而惡其事也令之以政而不知其所由然也施之以禁而不知其所以失也民行而無所循習動而無所法守不勝其欲而各以知求之知上之有以禁我也則各以詐相遁有司見其然於是多爲刑辟以束縛之條律之煩至不可勝數以治其不幸而不能逃者其幸而能逃不抵于法則又莫之問也雖其不能逃而抵於法吏當之死而不敢怨而其所以然者豈非其人之大不幸歟此三代以下所以小治不數見而大亂不止者也楊雲􅃢覽煇閣詩序余年十八九時始求友最先得雲􅃢時余姊之壻董超然與雲珊銳意爲詩三人者居相邇朝夕相過過卽論詩余心好兩人詩未暇學也其後三四年各以衣食奔走南北率數年乃一得見見輒岀新詩各盈卷而余學詩久之無所得遂絕意不復爲毎見超然雲􅃢讀其詩恧然以媿超然之詩始學杜甫務爲巉刻沈壯晩乃歸于宋人以瀏亮湊泊爲工雲􅃢則一宗仰李白益以恢張雄奇踸踔天地揮霍日月以寓其不可一世之槪嘗游大梁與客登吹臺酒酣集王勃滕王閣序字爲七言律四章振筆書􅁓雲湧飆發坐客瞠視謂高適杜甫後一千五十餘年無是會也然超然雲􅃢抱其奇游天下天下交口稱其詩而兩人窮愈甚超然暗嗚叱咤悲憤雄厲之氣時見于詩而雲􅃢益豪邁尙奇磊落不可遏抑乾隆乙卯余依惲子居富春雲􅃢適至畱數日將別子居餞之觀山之顚把酒瞰江風雨驟至山水汨没魚龍呌嘯雲􅃢慷􅁣長歌意氣甚盛然余微觀其詩酒閒往時少年跌宕之槪殆有不同人生憂患卒卒年歲一去不可復得囘憶身世又足嘅也嗣後不相見者又四年今年雲􅃢以書來言束鹿令李君鈔其詩三卷刻以行世屬余爲之序往時嘗􅃧謂超然雲珊僕不作詩諸君詩集成要當僕序之今雲􅃢索余言其可已耶然余不工詩豈足以論雲􅃢之詩雲􅃢方治經爲漢儒之學所著書益多詩又豈足以盡雲􅃢獨吾三人二十年來遊好之迹雲畱風逝不可把玩讀雲􅃢詩怦怦有動于中書之以訊超然于江南新詩近如何也莊達甫攝山采藥圖序始余見達甫圖其貌取杜甫詩題之曰看劒引杯時達甫方壯年銳意天下事議論慷􅁣豪氣見于眉目閒迄今十八九年屢困場屋益衰且病以孝廉方正舉有司欲以應召用固辭不赴遂不復應進士舉而更爲圖曰攝山采藥或以告余曰達甫殆無意于世也夫余聞而疑之古之君子汲汲憂樂于天下者誠以道存也道苟存不以遇不遇異其志又不當以吾身之衰而有自安之心達甫年未五十道之行不行未可知縱不得于今亦當有以見于後而區區攝生之謀哉與向所聞于達甫者頗大異然余竊嘗論國家之用人也如臾柎扁鵲之蓄百藥焉取之必擇其地聚之必當其時儲之必僃其物一旦有用出之籠中而不匱焉者其求預也事方其急而號之山澤之閒其捆載而來者必柴胡桔梗也人葠紫芝丹砂石乳未有能致者焉人葠紫芝丹砂石乳之用而投以柴胡桔梗其不足以愈病而速之死也明甚見柴胡桔梗之不足以愈病而以爲天下之藥皆若是與夫偶得柴胡桔梗之效而以爲天下之藥莫良于是曾不人葠紫芝丹砂石乳之求者其惑豈細耶若是者曾不足以當庸醫而儼然任國家進退天下士自以爲得之世有臾柎扁鵲寕不爲大憂耶余又疑以爲達甫之意或岀于此然吾聞古之有道之士葢有重治其精神而易天下者吾未嘗學之也達甫儻聞之歟序其事姑以問之文稾自序余少學爲時文窮日夜力屏他務爲之十餘年迺往往知其利病其後好文􅃟辭賦爲之又如爲時文者三四年余友王悔生見余黃山賦而善之勸余爲古文語余以所受于其師劉海峯者爲之一二年稍稍得規榘已而思古之以文傳者雖于聖人有合有否要就其所得莫不足以立身行義施天下致一切之治荀卿賈誼董仲舒揚雄以儒老耼莊周管夷吾以術司馬遷班固以事韓愈李翺歐陽修曾鞏以學柳宗元蘇洵軾轍王安石雖不逮猶各有所執持操其一以應于世而不窮故其言必曰道道成而所得之淺㴱醇雜見乎其文無其道而有其文者則未有也故迺退而考之于經求天地陰陽消息于易虞氏求古先聖王禮樂制度于禮鄭氏庶窺微言奥義以究本原已而更先太孺人憂學中廢嘉慶之初問鄭學於歙金先生三年圖儀禮十卷而易義三十九卷亦成觕以述其迹􅁚闢其戶牖若乃微顯闡幽開物成務昭古今之統合天人之紀若涉淵海其無涯涘貧不能自克復役役于時自來京師殆又廢棄嗚呼余生四十年矣計自知學在三十以後中閒奔走憂患得肆力於學者􅂊六七年以六七年之力而求所謂道者敢望其有得耶使余以爲時文辭賦之時畢爲之可得二十五年其與六七年者相去當幾何惜乎其棄之而不知也後此者尙有二十五年耶其庶幾有聞其訖無聞乎他日復當悔今日之所爲如曩時未可知也然余之知學于道自爲古文始故檢次舊所爲文去其蕪雜自戊申至甲寅爲一編丁巳戊午爲一編存以考他日之進退云安甫遺學序右凡三卷歙童子江承之安甫􅁧安甫生十四年而學學四年年十有八正月一日歾于京師其學好鄭氏禮虞氏易非二家之說猶泥芥也其志以爲易亡于唐禮晦于宋傳且數百年本朝孺者乃始有從而發明之然數十年之閒天下爭爲漢學而異說往往而倡學者以小辨相高不務守大義或求之章句文字之末人人自以爲許鄭不可勝數也故其治鄭氏則依于婺源江徵君及歙金先生其治虞氏則依余之易義然皆貫串經文以求其合其有不合雖余口授不敢信爭之毎齗齗盡悟乃已其自期賈孔以下蔑如也嗚呼學者患志不䔍志䔍矣患擇術不正術正而志䔍如理颿楫而􅆓于通川其至海也必矣然而不至者豈非命哉嗚呼觀其零文碎義之偶存者如此亦足以悲其志矣虞氏易變表序虞氏易變表亡生江承之安甫所作也安甫受易三年從余至京師乃作此表其義例屢變益審故爲完善自鼎以下十五卦未成安甫死之七月余役陪京館舍無事乃取其稾校錄而補之定爲二篇附于消息之後嗚呼吾書苟傳也安甫爲不死矣說江安甫所鈔易說凡余所著易說安甫手寫者虞氏義九卷消息二卷禮二卷事二卷候一卷鄭荀義三卷緯略義三卷共裝爲八本唯别錄十七卷未及寫而安甫死矣余以嘉慶丙辰至歙居江邨江氏明年余書稍稍成時余之甥董士錫從余與安甫年相及相善竝請受易各寫讀之所居橙陽山門前有小池夫渠盈焉時五六月閒毎日將入兩生手一册坐池上解說風從林際來花葉之氣掩冉振發余於此時心最樂其冬士錫歸常州學以不能竟而安甫明年從余至浙文明年遂從余北來兩年之閒非疾病未嘗一日廢此書非舟車逆旅未嘗一日不寫此書葢能通者十五卷矣嗚呼余爲此書好之者安甫耳士錫耳士錫敏于安甫而精專不如又不竟以去安甫爲之幾成而竟死後之人其況有傳吾書者耶雖有之其于吾也奚所樂于其心故裒安甫所寫爲一帙時時覽觀以寄余之悲焉安甫幼時不喜學作字故其爲書速而拙比來京師乃自恨學顔魯公大字筆力勁整可愛安甫死之十日夢于余曰請讀書禮乎易乎余呼之如平生曰二汝乃今爲鬼安所事禮順陰陽時消息幾以奠汝游魂安甫諾而去自是未嘗與吾夢接也嗚呼安甫其尚不忘于兹耶嗚呼可哀也已送左仲甫序陽湖左仲甫爲縣令之六年以催科罣吏議將謁部是時天子始親政事赫然誅元惡召安徽巡撫朱公入爲􅃁宰瀕行仲甫謁公于途次公賜之食從容問政要仲甫以爲方今大患在天下之才不足以任天下之事夫上之所取下之所習無事之所養有事之所用今國家求政事之􅃟而于時文詩賦取之其不足以得士也明矣夫時文詩賦非一日之功也士葢有數十年爲之而幸一日之得焉自非有過人之資未有能通世務知治亂者也其有能通世務知治亂者其見棄于時文詩賦而不獲􅃟者則亦多矣方今科舉卽不能改宜令天下薦舉有文武智術之士朝廷試而用之庶幾于事有屬方今郡縣駐防之兵所得額餉少者日才白金四分而上官供億公使往來之資文岀其中兵以所得餘金養父母畜妻子其爲農賈伎業以給焉者艮兵也桀黠者無賴於鄕曲矣夫不給其家而求其服練雖孫吳不能而況用其死乎則以爲宐優其給而捐其擾然後乃可責其用朱公難其說仲甫至京師以吿其友張惠言惠言曰國家養文武士一百五十年矣其爲澤至深厚而爲士者日以嗜利而無恥爲兵者日以怯弱而畏死見豈無故哉今朝廷求言如不及朱公以道輔治仲甫之言行不行未可知也抑仲甫之道大用之于天下小用之于一邑其可乎古者郡縣掾吏皆官長辟除孝廉茂才則于是乎選故守令常恃以爲治今者悉更之以書吏官待之以僕隸之體而吏自待以商賈之心夫責僕隸以禮而冀商賈以廉無是理也書吏不可廢矣若仿古三老孝弟之制鄕舉其賢能以賓禮禮之使爲敎化之倡而任以保甲之事則催租捕盜之吏可以不至鄕里而縣無事且夫一縣之役無慮數百人其得食于官者數十人而已以無所資給之人入而辦公事趨之若騖者誠有所利也其皆不得已而用之乎抑猶有可汰者乎縣令貧非可以財優之也少其人則其用易給而可繩以法矣方今用人者曰公而已夫進賢退不肖之謂公賞善罰惡之謂公今者唯成例是視其所謂公吾所謂私也故公賞不兄勸而公罰無所懲公之爲蔽如此而賢者不之喻愚竊以爲大過非仲甫吾誰與語之于其行遂書之以爲別嘉慶四年五月十五日送趙味辛同知靑州序古之仕者在州郡則澤及一方在京朝則澤及天下故賢者自京官出于外則爲不得其志而朋友亦相與咨嗟歎惜之今之世則不然京官之號爲淸要者非有議論事權有裨于上下者也朝廷歲命宰相卿長察任治事者簡以爲外官大者郡守小者司馬別駕州牧天子重其親于民親引而見之然後可其奏其鄭重如此夫古之君子患其道之不行也不患其官之不榮也患其德之不稱位也不患其位之不副德也而京官之出于外以爲不得其志相與咨嗟以惜其去是徒欲榮其身顯其位而不願其道之行澤之及于下也趙君味辛居中書二十年出同知靑州趙君賢者內閣要地二十年而方佐郡謂之得志可乎雖然宰相以趙君爲才而舉之天子以宰相所舉爲是而用之趙君獨得自簡其官乎同知之職于一郡事無所不參而又有專責督捕水利之事郡之治否于是乎在而趙君之德固足以澤于民是其志之得行也而以其身之不榮位之不顯惜其去者是朋友之私也故吾序此以解之趙君方歸壽其尊甫緘齋先生其以吾此說爲先生誦之必且忻然樂也書左仲甫事霍邱知縣陽湖左君治霍邱旣一載其冬有年父老數十人來自下鄕盛米于筐有稻有秔豚蹄鴨雞傴僂提攜造于縣門君呼之入曰父老良苦曷爲來哉頓首曰邊界之鄕尤擾益偷自耶之至吾民無事得耕種吾田吾田幸熟有此新穀皆耶之賜以爲耶嘗君曰天降吾民豐年樂與父老食之且彼家畜胡以來則又頓首曰往耶未來吾民之豬雞鵝鴨率用供吏餘者盜又取之今視吾圈柵數吾所育終歲不一失是耶爲吾民畜也是耶物非民物也君笑而受之賞以酒食皆歡舞而去曰本以奉耶反爲耶費焉士民相與謀曰吾耶無所取于民而祿不足以自給其謂百姓何請分鄕爲四四又爲三各以月入米若薪眾曰善則請于君君笑曰百姓所以厚我以我不妄取也我資米若薪于百姓後之人必爾乎索之是我之妄取無窮期也不可亳州之民有訴于府者曰亳舊寡盜今而多其來自霍邱霍邱左耶不容盜以旤亳願左耶兼治之嘉慶四年十二月霍邱有吳生在京師爲余說如此余同年友仁和湯吉士金釗吿余曰往歲北來道鳳穎閒往往詢其民人繇俗有刑獄不當賦役無節者民曰非霍邱左耶來誰與辨之有風俗乖忤水旱􅁈抑者又曰非霍邱左耶來吾屬不安樂矣曰霍邱左耶能爲河南省治獄吾不識左君何如人也余曰吾友左君二十餘年其爲人守規矩質重不可徙非有超絕不可及之才特以其忠誠悱愉之心推所學于古者而施之治效遂如此今之爲治者輒曰儒者迂闊患才不任事以吾觀左君迂闊人也如其才如其才左君名輔字仲甫以進士分發安徽爲知縣初爲南陵調霍邱嘉慶三年坐徵南陵錢糧不如期落職入見仍用知縣未補又坐徵霍邱錢糧不如期落職巡撫爲請天子知其名特許補合肥縣云吳生名書常亦篤實君子人也貤贈文林郎袁君家傳君姓袁氏名思齊字景賢武進夏雷邨人也袁氏始居夏雷邨者曰太學生峑六世而至君之祖家珍家珍生廷遴廷遴娶于蔣生君自峑以後世爲農家君幼習農力田作苦家以漸裕有田百畝宅二區然心獨好儒子孫皆使爲儒擇名師敎之敬禮僃至惟恐不順適其意所交游有文士至卽喜接禮之不倦如是二十年君之子淸憲始補博士弟子員後以副榜貢于鄉而袁氏相繼入學官者不絕淸憲之子筠以舉人令雲南覃恩貤贈君爲文林郎新平縣知縣至今稱爲文學家君有女弟適殷氏母夫人所鐘愛也閒日輒餽遺君必自􅀒戴往殷所居曰黃巷邨去夏雷邨二里所毎薄暮自田歸食己往省女弟返吿母無恙然後治家事也其後女弟之夫死子幼春耕君持酒食驅牛率徒役往爲殷氏耕畢耕乃返秋當穫君又持酒食率徒役往爲之穫畢致之然後返其耘耨亦如之君敎家以爲善曰日發一善心終歳便有三百六十善聞古人胎敎之法常以訓子婦曰欲子賢當如此故袁氏世孝友恂恂謹厚君之敎也君旣訓子以學迺建宗祠置祭器草家譜規模草創葢略僃焉君年六十五卒元配王氏繼徐氏竝貤贈太孺人子六淸憲爲長君卒之夕徐孺人以婚嫁未畢爲憂君指淸憲曰汝有此讀書明理之子何憂爲孺人泣君笑曰弗悲死歸也其識量如此君之孫祖望爲邑老師惠言少以父行禮之筠爲吏良友惠言故傳君于譜丹陽匡鼎來篤行士也嘗論君曰觀君臨卒兩言有味乎其言之也讀書則明理故可無後憂然則君之令子孫讀書豈區區富貴利達云爾然君未嘗讀書而考其言行世之讀書者或反不逮此豈非孔子所謂善人者耶君子以鼎來爲知言袁太孺人傳武進夏雷邨袁氏有賢母曰蔣太孺人副榜貢生贈文林郎淸憲之妻子曰祖期祖望祖修祖訓筠皆以文行稱于庠序而祖望爲最學者字之曰念方先生筠以舉人爲雲南知縣有循政覃恩得贈爲太孺人袁氏世力田至淸憲始治舉子業其考貤贈文林郎思齊敎子孫有法度太孺人妊身卽戒以古胎敎之法及舉子訓之曰勉樹德勿姑息以勖而子成太孺人謹而行之其敎子自其齠齓令長者慈少者恭翼如也學有閒怒之嬉戲責之有不悌遜痛懲之無得貰者故祖期兄弟幼皆恂恂無疾言遽色無子弟之過長而皆守其敎以克有成太孺人爲人恭敬仁愛儉於已而周于人御一食有不得食者在其側不甘也服一衣有不得衣者在其側不燠也袁氏之族十二支同邨而居者及異姓僅百餘家長者無弗長也如其長幼者無弗幼也如其幼有乏無弗賙也有急無弗急也有疾病必問之必餽遺之憂之也若在已十二支之姻親宗女至無弗禮也於其親者館之加隆焉下逮戚屬之臧獲必易服乃見予之食然後聽去雖匃者必食之飽年老癃病或畱之宿給以米然後遣之匃婦有老而謹者時時至或輟食食之徹茵蓆寢之推其心惟願接于我者靡不得所不知有貴賤之分人我之異也然太孺人家僅中人產所賜予人皆出節儉及紡織衣服無得畱篋笥者率爲人乞去質錢冬寒常以所薦茵與無被者其子婦知之更以進則卻之曰吾弗寒也固請薦之閱旬日則或又以與人矣太孺人年八十八卒以乾隆壬子之十月卒前數日猶扶病出爲人計畫薪米葢其天性然病革筠侍語之曰今而知萬事莫如爲善也又日子孫務勤讀勿與人爭利利與人同則有福而無禍始太孺人祖姑蔣以勤儉好施稱賢於諸孫婦中獨善太孺人曰吾與若同氏惟若能嗣吾及太孺人老而訓子孫必曰吾聞之祖姑如此論曰夫子有言婦人學于舅姑觀贈公之戒太孺人自胎敎始而太孺人言必稱祖姑袁氏之丗德有以哉有以哉婦人之慈仁者類能好施予然如太孺人之同視一體何其發於至誠而施行之不倦也及其秉禮審義動識大體此豈婦人之仁哉鳴呼可謂賢矣江安甫葬銘江承之字安甫年十四從余學時文十五讀江永鄕黨圖攷奮然請治經受鄭氏禮記日夜誦習旁及他鄭氏書先漢諸儒說攷校推究往往通大義時余方次虞氏易又請受之每一卷就輒手寫講解比余書成而安甫悉能指說益爲余校其不合者數十事十七從余來京師更受儀禮讀未竟以嘉慶五年正月一日病死年十八安甫於世事無所嗜獨好治經於世之人無所悅獨好余唯余言是從飮食寢處必余依暫去余皇皇若無所稅其從余而來也余不忍沮其父母憐之亦不忍拂也其治經唯好鄭氏疾非鄭者如讎嘗寫後漢書鄭康成傳而次其年譜繫之以文悠然有千載之思往往欲著書余毎戒之今檢其錄有曰周易爻義曰儀禮名物皆無書鄭氏詩譜虞氏易變表略已具未就余取其易表附于吾書而錄其條于各書者次爲一卷庶以存其大凡安甫徽州之歙人父曰毓英有兄弟聘妻吳氏先二年死年十有七歙俗嫁殤以其喪歸江氏安甫死之三日余殯之京師某月日毓英以書來歸其柩某月日至歙以某月日與吳氏合葬於某原余旣傷安甫之死而重悲其志故爲之銘以遺其父使刻之銘曰爾以吾爲歸爾之死吾尤誰天乎人乎後其尙有聞乎嗚呼祭安甫文嗚呼爾有父母爾有弟兄棄愛割慈從吾北征爾之從吾如影依形爾之聽吾如響荅聲嗚呼夫孰使爾志之卓而忘其道之艱夫孰使我愛之篤而忘其體之孱是豈有冥冥者爲之而吾與爾皆會其適然嗚呼出之幃房之内而置之風雪之區又不能時其寒燠而使隕其軀是得謂之命乎時余之辜斯已矣嗚呼死者有知當求康成仲翔氏於地下而師之爾奚羨乎永生而吾之愧憾以悔悲不見爾學之成者其將終古而無窮也耶尙饗又吿安甫文吿安甫汝命止此復何言耶吾疾困不能憑汝以訣豈亦命耶汝魂有知其能南歸依爾父母耶其未能耶朝夕依吾勿他往也嗚呼吿斂吿安甫此屋不可居今將殯汝于橫街白衣菴西偏之室是亦汝幽宮也汝安之吾未有定居魂氣無不之視吾之所在汝來依我吿殯吿安甫此凶宅也汝知之吾弗知以戕汝吾忍復居此耶今日之酉陰陽家言汝反宅中汝之魂其不眷于此室也其卽爾幽宮無怨無恫幽明雖隔魂魄何其遼邈哉吾靡所定居凡所舍止卽爲吾宅汝來夢中與我共語門神戶靈勿呵勿阻吿反宅公祭董潯州文古稱文人少達多窮或困名位坎壈以終亦有起之莫或擠之孰執其樞終然不施噫君之生早鞠荼苦九齡孤兒母氏是怙匪母是怙亦母是師臨機授經琅琅厥辭兒飢無食兒寒無衣母氏謂兒莫疚以悲兒通經術當爲國毗他日飽暖勿忘此時寒人知寒飢人知飢兒拜受敎雪涕充頤吾鄉之文唐薛已遠陶蔣之後波蕩靡反孰云振之僉曰微管蠅呻蛙吟澡若濯澣君受其業厥聲喤喤昌黎之傳得皇甫張春葩怒抽秋濤驚滂巨刃施手摩天而揚精心四周植于中央驅騁壇坫三十餘年名高數奇往蹇來連以昌其詩開流灑川寶棄誰怨和氏斯愆荀􅀸遊學四十乃通旣第春官民曹是庸維時管君亦在郎官君來頡頏若靳附鞶同執玉敦共掌珠槃遠近歸高黻佩冕冠古有二妙曾何足歎旣最五司洊崇左省陳殷師􅀸計歲貳棅帝曰嘉兹克咸爾勲命于南州以作爾勤世言儒生用不邇世君才槃槃通達政治庶隆大猷副彼利器一麾霜肅五馬星馳篠驂􅂊訝薤露遄晞奇抱長閟修懷竟摧嗚呼文星天絕其系管君先隕君復後逝半載匪久喪我二士如何昊天景命勿遂家多哭寢士競爲位疇昔之日飮餞之辰言笑晏晏高談載申君言朋友是維大倫六行有四任䘏睦姻富乃行德貧斯弗親如決西江詎甦涸鱗我欲制用三科是分一曰公貲二充家緡三爲客儲親疏以均嗚呼此志曾是莫伸大厦廣覆今誰與鄰遺此一言寒畯歸仁萊蕪塵魚西華葛帔維淸維貧詒厥孫子英英宗介亦紹丕祉學君之文述君之事君所未竟尙克有嗣潯江悠悠旣阻且長君去幾時君赴在堂銘旐弗瞻生芻曷將陳牲在俎釃酒盈觴君其鑒誠翩然以饗爲諸生祭歐敦甫文嗚呼敦甫以子之聰穎特達而學不底於成耶以子之孝恭温良而行不獲其亨耶天之生材曷弗艱耶旣已生之而摧折天閼使中道顚耶將榮者自華落者自苓而舉無關於天耶嗚呼敦甫毁不滅性子未聞耶胡一哀之不勝而遽隕其身耶將菁魄之竭已久而不復振耶抑飮食匪宐藥物匪良而遘此屯耶君子觀過斯知仁耶孰云死孝而弗珍耶嗚呼敦甫吾不見子旬有餘日耳豈謂朋友之分盡於斯耶其不隔於吾目者忼朗精敏其子之英爽渝而不澌耶其不絕于吾心者􅆞綿肫篤其子之相與氣誼沫而不衰耶胡爲乎朝之言怡怡夕之言嘻嘻而易以同志之閔涕師長之嗟咨耶嗚呼是亦悲矣而況垂白之老扶杖而慟下顧繼嗣而斬焉隳耶嗚呼敦甫其有知耶其無知耶子而無知吾爲誰悲耶子而有知吾悲有時殺而子之悲于地下者其無窮期耶嗚呼敦甫命耶非耶命非吾與子所能制而又奚悲耶絮酒一樽尙歆兹耶嗚呼哀哉茗柯文四編詩龕賦梧門先生貯古今人詩于一室題之曰詩龕或曰詩之有梧門猶禪之有上乘正覺也故龕之余以爲不然禪之有語言文字下也梧門奚取焉嘗謂六義失而詩道變變窮于禪詩龕云者窮其變而存之也夫存其變者可與正矣乃賦之曰夫惟二雅之多材兮古之號曰九能商臮姬而三百兮欥至聖之所裁屈摛賦以贑憤兮宋儀之以哀曲睠河梁之執手兮放五言之高躅班分馳而竝進兮遂世嬗而家貿驟煩聲與詭律兮豈輶史之所受吾聞詩之爲敎兮政用達而使專何古人之尒雅兮今惟繡乎帨鞶豈緣情之或非兮固同川而改瀾亮余志之不芳兮雖薜茝其孰玩曲有變而殊奏兮言有畸而異方羌山水之云滋兮曾吿退乎老莊旣俶之以曠放兮遂逃虛于禪寂識多歧之必究兮世孰通其蔽惑五金躍而待冶兮八材區而俟工覽焦墟之一派兮知眾流之必東啓兹龕而畢受兮攬斯文之變態會秦越而儳言兮錯朱素而儷色將編仁義以爲藩兮結道德而葺之峙六義以爲壁兮楹四始以相持介奚斯而擯吉甫兮延考父于東序陶潛揖于庭堂兮甫白儼而翼宁庶僞體之有裁兮範九軌而同途起往賢而質中兮俟來哲以通符必白而稱覺兮又胡爲此蘧廬尙友圖銘孟子曰以友天下之善士爲未足是以尙論古之人而友之夫以天下之善士友天下之善士必無見爲未足者也以天下之善士爲未足其人必不止天下之善士也雖然頌其詩讀其書猶以爲未也又論其世則雖古之人友之豈易足乎孟子所論于古者伯夷伊尹桺下惠而猶以爲不同道然則孟子之所尙友者孔子一人而已故君子之觀人也視其所友于世無所不屑者未能高于世者也于古無所不屑者未能高于古者也海甯陳子仲魚畫尙友圖武進張惠言銘之曰余以今之友爲寡兮求于古而豈多余惟古之爲歸兮古之人其謂余何去之五百嵗其援余手乎余孰且無友乎送福子申宰漳平序吾嘗讀孟子降大任之說而竊怪世之貧賤者何其顚頓困踣而不克自振者之多也豈孟子之說亦有時而不驗耶將天之苦勞餓乏拂亂夫大任之人者非猶夫苦勞餓乏拂亂夫人人者耶葢古之君子其志固皆有天下自任之重其學問固皆有非義非道不受高爵厚祿之心夫如是而嘗之以勞苦餓乏拂亂之遇使之厯人世之情僞而迭試其德慧術知於經權變故之交故其得于中者益堅而用于事者益密此其所以動心忍性曾益其所不能也今之君子則不然其志之所願不過身家衣食功利之務其學問之所及僅僅知惡之不可爲而未必識其所以幸而遂其生優遊其心而養其廉恥猶司日龜月勉而不喪其素亦庸有進焉不幸而苦之勞之餓之空乏之拂亂之彼其心如以未成之舟無檣楫之具驟而放乎江海衝洪波觸高浪目駴神􅅭手足顚倒尙何心之能動性之能忍而不能之能曾益哉故曰天之霜雪一也凡卉得之以殺而松柏得之以堅士之處貧賤烏可一槪而道哉吾友福君子申自乾隆癸丑成進士失朝貴人意擠而蹷之至今十年始得􅃟爲令葢吾始見子申時年甚少氣甚高才銳而識擴以之辦天下事若不難也雖朋友亦許爲然已而擯不用家貧甚服勞事親艱瘁僃至十年之閒其氣充然以夷其才黯然以㴱其識淵然以長葢吾所交多貧賤之士其能自振拔不隨流俗者固不少而得力于勞苦餓乏拂亂以成爲有用之才者未有如子申者也夫以子申之才僅僅爲一令天固非以此任子申而所以動之忍之曾益之者自此益大雖然今之縣令古百里之國也管夷吾百里奚孫叔敖其治未有越於此子申行矣其亦曰天以苦我勞我餓我空乏我拂亂我也夫安往而不濟乎上阮中丞書伏承政化協和動履吉豫錫祚踐慶習于嘉祥樂只君子保艾爾後南山之詩所爲詠也曩者不敏以風聽不實之言瀆陳左右夫子不以其愚妄手辱誨諭使袪其影響之疑而進以大公之道又惟恐不盡其狂瞽之說勤勤焉誘而導之乃知鄙儒拘方不足閎域外之度而大君子因物付物無一毫適莫于其胸中而分寸節度權銖衡黍纖芥之翳不得容于其閒所謂先􅁴者不逆詐不億不信於夫子見之夫取善節則人有其善與善廣則人勸于爲善好􅀡言則人孰不樂吿之以善此三美者古之君子治天下未有不由此者而夫子實允迪之則夫知人安民致吾君于堯舜光德業于三代豈獨及門之士所稱誦而願望者哉惠言嘗竊以爲在上者之用人也如良醫之聚蓄百藥焉自紫芝人葠丹砂石乳以至柴胡桔梗烏頭鉤吻莫不僃具故一旦有所用取之籠中而不匱焉者其求豫也求之不豫而用之匱其不至雜投也者幾矣雖然其取之也則有閒矣命之于野捆載而來者柴胡桔梗也烏頭鉤吻其得之也不難然制而用之達其性而殺其毒迨其熟也非一朝夕矣紫芝人葠丹砂石乳則必求之㴱巖之下幽谷之中葢有曠年而得之或亦有不得者焉雖然其用之也則又有分矣柴胡桔梗爲用也廣而不足以起痼疾烏頭鉤吻投之當其力十倍然而懼其元氣之傷也紫芝人葠丹砂石乳可以起沈痼奏殊效常服而無後患用人者亦然跅弛之士貪詐之才任之以濟事殆有所不得已也今夫子旣能制烏頭鉤吻而用之矣則其無所遺于紫芝人葠丹砂石乳決也浙東西之廣士大夫之都夫子不亦得其人乎毋亦有伏匿㴱巖幽谷而不得接于籠中者乎如得其人其與烏頭鉤吻之用當什伯也如未得其人則世道之憂愚竊以爲方今之務未有先焉者也易曰羸豕孚􅤲􅤳言豕之孚以其羸而未嘗忘􅤲􅤳也昔寇萊公薦丁謂于李文靖文靖曰才則才矣如斯人者可使之在人上乎萊公曰相公終能抑之使在人下乎文靖曰他日思吾言也司馬溫公欲罷免役刻期五日當時范忠宣蘇文忠皆以爲難而蔡京獨如約開封畿縣無違者温公喜曰奉法當如此然卒亂宋者京也夫使謂與京長爲文靖溫公用雖終其身爲君子可也然用之者不能皆文靖溫公而謂與京之才又自不可遏抑此如以柴胡桔梗制烏頭鉤吻欲其毒之不發也難矣故良醫務蓄珍藥而君子務樹善人紫芝人葠丹砂石乳苟得其用則烏頭鉤吻之利可廢卽藉之而決不爲後患矣此惠言爲育才者言之非斤斤不忘于此一人也葢君子之行也爲可終也爲可繼也不自吾身而已矣關􅅦之事儻亦有然想遠慮㴱思當有以處此惠言竊惟無隱之義不勝大願欲夫子爲斯世宏人材之路爲百穫之計故不改其野哉而敢以聞于圅丈伏惟有以誨之答錢竹初大令書春閒辱手書伏承憂患之餘有假年寡過之想以惠言稍知易理命決之于筮占惠言之于易葢所謂臆說而不知是且非者然竊不自葢覆有辱問者往往發其卮言矧以先生之命而敢固匿然而承命以來百有餘日未知所以報者何也他人之所惑者富貴貧賤窮通得喪之交戰是其吉凶之故皆有數以制之而推而言之以合于人倫天道所當盡者皆爻彖之所宜吿今先生旣已脫人世之覊馽又息心遠覽浮游塵滓之外則所爲富貴貧賤窮通得喪者他日子孫之事無與于先生而先生亦必且視之如太虛浮雲而不足動其靈臺推先生之意􅀡以爲神仙之術呼吸吐納以求長生之日久未知道家所謂福緣者何如儻其得悟大道而與天地同久耶其敝精勞神而無益壽命之數耶此先生所以疑而欲一決也子曰道不同不相爲謀惠言所習者伏羲文王孔子之易非魏伯陽陳摶之易子曰攻乎異端斯害也已假而孔子所謂害者進而叩其說于孔子其不肎相吿決也此惠言所以不敢報命也雖然來命欲究損益之義窮性命之理此則惠言所誦習者敢不爲左右陳之孔子曰原始及終故知死生之說人以陽生復人之始也坤人之終也自復而臨而泰謂之息人之少而壯也自否而觀而剝而入於坤謂之消人之老而死也獨陽不生獨陰不生陽爲主則陰成之復臨之時有遘遯不足以消復臨也陰爲主則陽伏藏而不勝觀剝之時有大壯乾不足以息觀剝也往來者惟泰否焉故泰否者盛衰之樞也君子泰則不使爲否否則能使爲泰其用在損益故曰損益衰盛之始也乾道變化各正性命保合太和乃利貞言陰變陽化六位各正如旣濟也故損之變爲旣濟則不反否益之變爲旣濟則反泰所謂各正性命也性者人之成也于卦爲震命者天之令也于卦爲㢲益之爲􅁚也復乎性而盡命損􅁚反之反性命者不可以久故可貞正其性命也故人之盛也而忽衰忿欲害之也懲忿窒欲損之道也雖常泰可也人之旣衰也是忿與欲之過也遷善改過益之道也雖反泰可也君子窮理盡性以至於命如此而已雖然君子豈以爲常盛而不衰哉性也者人之成也命也者天之令也成于性者吾勿􅍊之而已命于天者吾何知焉苟求知是乃欲也一陰一陽之謂道旣濟之􅁚是也君子之正性命也爲明道也爲行道也故曰朝聞道夕死可矣無益於天地萬物而私其身以長存君子以木石之生猶之乎腐草之萎爾已且夫泰損其初則損損其二而益損其三而否矣夫否損其上則益損其五而損損其四而泰矣故益有損焉益之大者也非損也損有益焉損之大者也非益也君子勞精神苦思慮汲汲然不敢寕也皇皇然不敢暇也内以益其心而外以益於人是損而益也君子謂之泰若夫屏聖智絕禮義嗇其精恐其易竭也保其神恐其易耗也内以愚其心而外以亂天下是益而損也君子謂之否也今聞先生于橫逆之至未能平其心而騖焉長生之是求毋乃忿之未懲而欲之未窒乎彼魏伯陽陳摶之所謂性命者如此焉則惠言不能知也若伏羲文王孔子之所謂性命者則惠言知其不如此也然則君子之所汲汲皇皇而有事者何哉其在損曰利有攸往言懲忿窒欲之當有事也曷之用二簋可用亨二簋者祭禮也可用者誠也天子祭八簋降損至士而用二敦同姓則二簋謂禮之别尊卑定親疏也夫忿之來也愛人而不親也禮人而不答也則分不正倫不序而誠不至也二簋可用亨而橫逆如故則妄人而已矣君子不忿也夫欲生于不知足不知足生于不知禮二簋用亨禮如是不敢過也不敢過而欲不窒者寡矣使損其疾使遄有喜明忿之無自來也或益之十朋之龜明不待欲而足也是損之義也其在益曰利有攸往利涉大川言遷善改過之當有事也夫不明于善之爲善過之爲過而遷之改之者必不益矣何以明之曰禮也夫禮有文焉有數焉非可以意造也故得過其過而善其善益之二曰亨帝吉禮之大者也三用圭凶禮之大者也四遷􅀖軍禮之大者也中行吿公賓禮之大者也故吉凶軍賓之禮具而後可以遷可以改是益之義也先生將修魏伯陽陳摶之所謂性命者則惠言不能知也若將求伏羲文王孔子之所謂損益者則惠言之說其是乎其非乎將就先生正之也抑又聞之財者生人之大命泰之􅁚曰后以財成天地之道輔相天地之宜以左右民君子所以成天地佐百姓舍財無以也說易者謂聚財則損散財則益是不然聚財者小人之事也散財者豪俠之事也君子之財有損益而無聚散要在用之以禮而已二簋非少也十朋非多也君子之用財也使親者加親而疏者不遠也尊者加尊而卑者不陵也二簋用亨之謂也旣辨其親疏尊卑矣又辨其賢不肖或益之十朋之龜之謂也夫然故百姓戴之于下有孚惠我德之謂也賢士奉之于上得臣无家之謂也夫苟賢士奉之百姓戴之文何橫逆之足患哉方今吾鄉風俗益偷禮敎益薄此世道之憂搢紳先生之恥也先生學問行誼爲鄉人典型惠言自勝衣則知企仰于今三十年矣奔走南北望見淸光之日少未得竭志意于前誠願少囘莊列之志就周孔之軌推酌損之義孚惠德之心脩二簋之誠廣十朋之用就大作之利遠或擊之害則身名泰而性命長鄉里皆有所矜式小子狂簡不知所裁先生不罪其慢迂而敎之幸甚嘉善陳氏祠堂記宗祠非古也古者大夫士立廟各有數皆于大門之内其自別子若始遷爲大夫而其子孫繼世者得立爲太祖然昭穆之世惟及祖考有大事省于其君乃祫其高祖非如後世宗祠自始祖以下皆立主而祀之也其繼世爲大夫者或失位則廟亦毁非如後世宗祠一成而弗廢也三代而下宗法不立民無統紀而輕去其鄉則背祖忘宗之患作宋之大儒憂之乃始講論使士庶人之祭皆及高祖而又以義起先祖初祖之祭宗祠之作葢由此其仿也夫聚百世之主于一堂而合子孫之屬以事之使俱生其水原木本之思而因進之以敬宗收族之敎于以惇化善俗莫近于此然則宗祠非古禮而得禮意後之君子恆兢兢焉務之余嘗游新安其大家世族必聚處所處必爲宗祠春秋祭饗盥獻拜饋往往猶有古禮故其民孅儉勤力而孤貧不收者鮮豈非先儒程子朱子之流澤長而其鄉先生世能振之哉葢大江之南風俗近古者余于新安見之休甯藤溪陳氏新安望也元時定宇先生倡明朱子之學爲世儒宗藤溪爲郡要衝余嘗過而拜其祠下及來京師嘉善陳孝廉治鴻與余同門知其爲藤溪之别定宇先生後也一日以其祖館陶君之命命余曰吾陳氏之定居嘉善當前明之季贈中憲大夫崇祀鄕賢府君諱華育及其弟華允華美爲三宗藤溪第二十九世也傳百餘年至乾隆戊午始建宗祠越三年而成迄今又六十年而祠未有記懼後世之無徵也當求能爲古文辭者而託焉以屬吾子余曰子之家有鄉賢府君之貽謀有定宇先生之世敎有新安程子朱子之風澤其汲汲于敦本懋族也固宜然而自中憲以來經營者三世遲至百年而後成信乎創垂之難也夫創之難守之詎易耶書之以吿後人又館陶君所以垂裕也余敢以不文辭乃爲之記曰乾隆五年嘉善楓涇陳氏宗祠成凡爲屋若干楹門二重前堂後寢牲殺有所尊盥有序滌濯有廡庖湢有宇名其堂曰承志紹祖也榜其門曰藤溪毓秀明宗也董其役者中憲君之孫某官廷玉增廣生起鳳求余文以記之者廷玉之子前館陶知縣某楓涇本曰淸風涇俗傳風爲楓云在縣西鄕四中區記管貞婦管貞婦徐氏武進人父鼎亨以進士官四川知縣有儒行吏蹟鄉人稱之曰南湖先生南湖先生以季女字同邑管繼楨子錫齡貞婦也嘉慶三年貞婦年十四錫齡死家人祕其訃貞婦陰知之言笑如平常明年南湖先生卒又明年兄某將以貞婦字他氏貞婦請歸管余翁者徐姻戚也夢南湖曰吾女欲歸管歸管非禮也爲我諭之余翁晨扣徐氏門則貞婦方爲母兄誓死翁大駭述其夢貞女曰兒之爲管氏父命也父命兒之婦管也卒固請而歸于管論曰女從父者也父未命適人而天夫是謂婦而不女貞女之辭以父命何其順也嗚呼自其聞錫齡之死豈一日忘管氏哉彼知父之以爲非禮也請之而不得必要之是戚父之命以成己志也夫是故忍而弗形曰孝也歟曰智也歟許省初家傳海甯許嘉猷嘗與余同敎習官學生相友善嘉慶辛酉謁􅃟知縣至京師時過省余爲言其六世祖省初君事曰許氏先塋在邑之洞孔山塋外有田勢家欲奪之以重利啗其族人或許之則犂其塋表族父兄莫敢言君年才十餘奮然以狀白布政使布政使下其事有司百計撓君君詞强弗能折久之卒以田歸許氏海甯西路鹽場課重一邑黃口腹孕皆有征竈戶大病君白當事嵗免金八百有奇丁減課一錢五分存場之徵三之一是時倭寇略海上都指揮周應禎禦之海甯君以便宜干之事多效嘉靖甲寅應禎逐寇至黃山嶺君集義勇爲左右翼倭懼遁去應禎治軍嚴海甯人德之㑹其殁君上其事巡撫請立廟於黃山名其嶺曰都司嶺君少補學官弟子一試於鄉不得志卽棄去讀書靈泉山中及卒縣人祀之西倉報功祠余曰古之人所以汲汲於仕進者豈爲一身之祿利哉懼其没没以死而澤不及于人也後之仕進者不然利害若毫毛比可以就其祿利者罔弗前也可以損其祿利者罔弗後也是故位愈高而業愈卑及其死也没没與匹夫等不亦哀歟君不屑與舉子伍而其所立者及于家及于邑殁數百年而俎豆弗衰其與當時之取科第爲顯官者得失何如也嘉猷請書其事于譜遂次而傳之君名敦胄字仍甫省初其號爲海甯靈泉里人其先自唐睢陽太守遠宋提督潞州軍事某始居海甯明初有國器者應特徵同知海州有政蹟祠名宦七世至君實睢陽之二十七世孫云承拙齋家傳承君名任字是常自號拙齋先生其先祖漢侍中祭酒宮宋南渡時有振者及其弟採僑居毘陵子孫世爲武進太平鄕篠塢里人拙齋採後也父兌以孝聞事在郡志拙齋學於宜興杭生通五經四子書泛覽百家爲詩古時文然以躬行爲務補學生員九試於鄕不得舉以所學授生徒終其身作愛吾廬記以自述其辭曰愛吾廬者拙齋先生讀書處也破屋數掾不蔽風日方庭跼武無佳葩奇卉可以娛目有書數千卷先生晝夜講習其中有四子一孫各授一經日與辨析疑義使爲歌詩文辭點筆以爲樂役使無童僕客有至者則延入蔬食相對與之論古聖賢若晤之几席也先生以致知格物爲基阯以身體力行爲堂奥以懲忿窒欲爲牆垣以推已及人爲門戶以書策吟詠爲園囿保吾天全吾眞處而安焉入而自得焉葢不足爲外人道也其指趣如此常語學者曰文詞小伎于身心何所益讀聖賢書如此爾耶子志試禮部瀕行命之曰行已有恥立身之大端也得失之際愼之志兄弟皆恂謹力學父之敎也著四書質疑錄拙齋集若干卷時文若干篇年六十有六嘉􅂟三年三月十五日卒子曰志曰惠曰懋曰憲曰甯懋早卒甯爲叔父後而志中式乾隆甲寅科舉人拙齋年十三而喪母卽知守禮父卒敎育異母少弟有恩禮居鄕長者行甚眾要其大者論之故不著杭生者名樂篤行君子也從學者稱畱閑先生目盲廢矣拙齋事之八年及卒邀其同門具其行呈于學官旌其門拙齋所授徒陽湖張湻宜興陸典疇皆以力行稱于鄕里論曰自時文之學興而六經四子之書爲科舉羔雁而已父以是敎其子師以是傳之徒周公孔子之說日舉于口而筆于書而終身不知其爲何物者眾也拙齋敎人求之身心而勖其子以有恥古之學者何以異是志爲余言君終身服一言曰恕然晚年乃曰吾嘗謂恕以接物善矣今而知未也當思孟子三自反然則拙齋得力之淺㴱與其勤于學至老而不倦皆可以知之矣陸以甯墓志銘乾隆辛亥余始識陸以甯于京師時以甯五十餘矣鬚鬢宣白而容貌充然望之類有道者與之語訰懇沖粹雖老不遇未嘗有憤懟之意其篤學力行又不以年之衰而懈朝夕也余禮之不敢與齒而以甯以朋友待余居相遠不時得見見則必論六經聖賢之道致治之源及古今文章升降利害欣然不覺坐之久也甲寅余聞先孺人疾馳岀都不及與以甯別明年乙卯余方居憂則聞以甯死矣越六年嘉慶己未余復來京師以甯之子念祖來請曰將葬願有銘余曰嗚呼非余孰當銘以甯者耶則受其狀已而葬中輟又二年念祖來速銘乃敘之曰君諱致遠字以甯又字秀石號緘齋姓陸氏曾祖韜祖世爵考祇德世居常州宜興宜興分荆溪爲荆溪縣人以甯少聰敏喜爲詩從詩人儲長源遊長源亟稱之曰吾詩授陸生矣年十九補縣學生員屢困鄉舉四十遊京師程編修晉芳善其詩由是知名于時又五年乃以國子監生舉順天鄕試六試禮部不第乾隆六十年大挑天下貢士以甯得敎官將歸俟􅃟而病發病閒遂行八月十一日至靜海縣之唐官屯卒于舟次厝其柩道旁元女廟中其明年念祖奉以歸八月十八日至荆溪厝之舍旁廣興寺嘉慶年月日卜地葬于某鄉某原以甯卒年五十有七娶高氏生子二人長念祖次貽孫女子子一人適某氏孫一人以甯早失怙恃家貧以教授自給恆客遊南至百粤北窮恆代所至周覽山川人物草木之變態悲憂懽欣感觸世事一寓于詩所刻采山堂詩一卷其少作也生平作甚多益工余性不好詩以是未嘗求以甯全詩嗚呼孰知其死之遽而其詩遂散失不可復次存者葢少也悲夫以甯晩年喜論經世之學好黃棃洲顧亭林之書又通醫善傷寒論治有奇效常曰六經重漢學醫又甚焉唐宋以後榛棘多矣明其傳者成無已最後方有執喻昌而尤善柯琴自云受之同邑張雲衢雲衢受之靖江鄭汝楫銘曰少迪領聞老弗頽連蹇其心身益夷德之不施昌其詩詩且弗存知者誰嗚呼以甯命若兹歸復故土魂不羈是固是安後嗣丕我銘其藏言罔諆千秋萬世徵此辭嗚呼以甯其又何悲例贈文林郎許君墓志銘君諱穆宗字剛中號履亭姓許氏世爲海甯人余作傳所謂秀才省初君者君五世祖也祖諱某考諱某娶于姚生四子而君爲仲君早失父家貧懼無以爲養乃輟儒業習賈當是時無一椽之居貰屋于吏部橋南奉其母而身往來吳越閒嘗雪夜步行百里并日而餐母供養僃已而家日裕作室龍山之龎橋名其堂曰經德樓曰萼樓塾曰汲脩以孝友忠信敎其子延名師誨之學皆克有成君貧時嘗夜得遺金於途伺其人而還之爲人賈有誤畀以五十金者數百里反之其營宅也里人有將搆釁者潛以骨一􅎆寘其下君見之惻然命卻地瘞之加葢薦焉其人大感媿一夕移之去且詣君謝君終身不言其人又嘗讓其兄之遺貲千金撫弱弟及兄之􅀌女皆有恩意養舅氏之老而無歸者葬之祀之其于鄕賑粟社粟修學宮志書君必董其事所輸過于其力故知與不知皆曰許君長者也嘗就相人相曰公痩形鵠立音聲越然身有二十餘子如丹砂法當立其家然有大厄今且至已熟視指之曰此所謂陰隲文免矣未幾鄰家火火延三十餘家比至經德堂風返火息有於火中見神人五導火行至君之屋而没羣以爲陰德之致云君先娶沈氏早卒無子又娶朱氏有賢行孝於姑勤於家約不困豐不泰生子三誾國子監生良模縣學廪膳生嘉猷乾隆已酉舉人敎習官學生以知縣用女一人適嘉興學附生王尙繩孫八人三人補州學生君以乾隆四十八年十一月十二日卒年六十有三後十四年嘉慶二年五月十四日夫人朱氏卒年七十有九又幾年誾等奉其柩以某年月日合葬于某鄉某原於是嘉猷來請曰願有銘余辱史氏不敢辭銘曰行之寅以甯其親德之有以穀其後其取于己也詳而天其昌之行之介其殖乃大德之施其裕乃垂其取于世也廉而天其咸之有澤不竭有銘不泐是維古君子之室而後其式之祭金先生文嗚呼六經同歸其指在禮誰歟明之北海鄭氏經唐涉宋大論日蕪天鑒大淸篤生巨儒乾隆之初婺源江公刊榛兌途灑流就東厥有繼者休甯之戴先生起歙竝黻聯佩戴君閎通眾流竝泳志脩年短厥緒未竟先生精硏思約理積掉頭庌廡壼奥獨闢旣啓其室遂周其籓桴杗㮞栭旣固旣完箋禮九篇以鄭正鄭惟其匡捄是謂篤信一義之發邇于睫眸先生不言千載其幽較其所成於戴葢多婺源之傳岱華比峩古人著書感發不遇先生不然頤志養素早年獻賦入贊機衡對策鑾坡聲震殿廷帝嘉其文冠之上第再命持衡愼簡俊乂翩然高蹈有遯若飛不事之功其成則巍杜門養疴二十一年旣定禮堂其人未傳景行實行高山惟仰昊天弗遺後學誰放伊蒙寡昧一言獲襃春風所噓不遺薪蕘三年在門莫窺美富旣困馳驅乃始自咎獨持緒論以當眾岐端策恐驟瞻途識夷丙辰之春再謁几席先生欣然曰子可益則理其􅁾則淪其淸拻之拓之以崇以閎閔其飢寒恤其生事割宅以居推食以食歲在己未孟春北征先生餞之肴核旣盈酒酣執手曰學實難瞢不知道繡其帨鞶前賢後生氣求聲應弗章弗傳孰美孰盛挹河知源測景知光今我老矣非子曷望疇昔之歲殷勤與書問子所學今則何如勉子舊聞告我新得使我暮年快覩奇特惶恐再拜􅀒慙此言匪敢怠荒乃爲俗牽逝將歸來返我矩矱庶幾籍湜果不畔去恭聞易簀命簡作椷寫不成章筆絕意嗛嗚呼微言遂絕于兹哭寢此日傷心曩時具存者書莫繼者事命我以意曷敢以二尙羈塵鞅罔遂駿奔輇紼不親奠斝弗存南望一慟吿兹哀衷言有弗宣哀其可窮先生之靈其曷不鑒未知後死斯言勿玷嗚呼哀哉
