body:
  text: 賜進士出身充實錄館纂修官武英殿協修官翰林院編修張惠言著初編自戊申至甲寅凡文十八首爲一卷二編丁巳戊午凡文四十三首爲二卷右先生庚申歲自編有自序三編自已未改庶常至辛酉散館止凡文三十首爲一卷右先生辛酉歲自編四編自辛酉五月至壬戌五月凡文十四首爲一卷右先生旣没士錫於遺稿中編錄者先生自編其文几爲他人作及壽言率不錄故据爲例所刪文則別編焉甥董士錫謹記茗柯文初編目錄自戊申至甲寅凡文十八首爲一卷游黄山賦并序黃山賦并序寒蟬賦并序秋霖賦望江南花賦并序竹樓賦并序賃春賦并序鄧石如篆勢賦并序長平鏃箴并序七十家賦鈔目錄序莊先生遺文後序書墨子經後讀荀子讀柳子厚天說送惲子居序送張文在序莊君墓表崔景偁哀辭茗柯文二編目錄卷上丁巳戊午凡文四十三首爲二卷楊隨安漁樵問對圖賦幷序周易虞氏義序虞氏易禮序虞氏易事序周易鄭荀義序周易别錄序易緯略義序詞選序丁小雅鄭氏易注後定序畢訓咸詠史詩序南華九老會倡和詩譜序莊達甫無名人詩序遷改格序茗柯文二編目錄卷下贈毛洋溟序送錢魯斯序與左仲甫書答莊􅀸􅢆書鄂不草堂圖記江氏墓圖記周維城傳濟南知府莊君傳封文林郎惲君墓誌銘楊君茹征墓誌銘恭城知縣陸君祠版文先府君行實先祖妣事略先妣事略茗柯文三編目錄自己未改庶常至辛酉散館凡文三十首爲一卷蕉花賦幷序館試靈臺偃伯賦館試蜡賓說禮賦館試匠成翹秀賦館試天以爲正周以爲春賦館試大愷樂賦館試龍見而雩賦散館大禮與天地同節賦原治楊雲􅃢覽煇閣詩序莊達甫攝山採藥圖序文稾自序安甫遺學序虞氏易變表序記江安甫所鈔易說送左仲甫序送趙味辛同知靑州序書山東河工事書左仲甫事記族弟平甫語呈座主阮侍郎貤贈文林郎袁君家傳袁太孺人傳江安甫葬銘祭江安甫文吿安甫文三首祭董潯州文爲諸生祭歐敦甫文茗柯文四編目錄自辛酉五月至壬戌五月凡文十四首爲一卷詩龕賦并序尙友圖銘并序送福子申宰漳平序上阮中丞書答錢竹初大令書嘉善陳氏祠堂記記管貞婦許省初家傳承拙齋家傳陸以甯墓誌銘例贈文林郎許君墓誌銘祭金先生文
