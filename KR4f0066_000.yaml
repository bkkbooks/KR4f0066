front:
  text: 序武進張大令式曾將重刻其曾祖王父皋文先生茗柯文集而以寫本示余屬為之序蓋文章之變多矣高才者好異不已往往造為瑰瑋奇麗之辭倣效漢人賦頌繁聲僻字號為復古曾無才力氣勢以驅使之有若附贅懸瘤施膠漆於深衣之上但覺其不類耳敘述朋舊狀其事迹動稱卓絶若合古來名德至行備於一身譬之畫師寫真衆美畢具偉則偉矣而於其所圖之人固不肖也吾嘗執此以衡近世之文能免於二者之譏實鮮蹈之者多矣皋文先生編次七十家賦評量殿最不失銖黍自為賦亦恢閎絶麗至其他文則空明澄徹不復以博奧自高平生師友多超特不世之才而下筆稱述適如其量若帝天神鬼之監臨褒譏不敢少溢何其愼與自考據家之道既昌説經者專宗漢儒厭薄宋世義理心性等語甚者詆毁洛閩披索疵瑕枝之搜而忘其本流之逐而遺其源臨文則繁徵博引考一字辨一物纍數千萬言不能休名曰漢學前者自矜創獲後者附和偏詖而不知返君子病之先生求陰陽消息於易虞氏求前聖制作於禮鄭氏辨説文之諧聲剖晰豪芒固亦循漢學之軌轍而虛衷研究絶無陵駕先賢之意萌於至隱文詞溫潤亦無考證辨駮之風盡取古人之長而退然若無一長可恃其藴蓄者厚遏而蔽之能焉而不伐斂焉而愈光殆天下之神勇古之所謂大雅者與張氏之先兩世賢母撫孤課讀一日不能再食舉家習為故常孝友艱苦遠近歎慕自粵賊縱橫東南糜爛常潤等郡室廬蕩然張氏之窮約殆有甚於疇昔書籍刻板皆摧燒不可復詰矣余昔讀張氏諸書既欽其篤行茲重覽茗柯文編樂其復顯於世也乃忘其陋而序之同治八年十月湘鄉曾國藩序武進張皋文編修以經術為古文於是求天地陰陽消息於易虞氏求古先聖王禮樂制度於禮鄭氏豈託於古以自尊其文歟又豈迂回其學而好為難歟聖人之道在六經而易究其原禮窮其變知扶陽抑陰之旨然後交際之必辨其類議論之必防其流失也知經上下定民志之旨然後措施必求其實有裨於治許與必衷於彝典也下及騷選其支流也近時易學推惠氏棟禮學推江氏永而二家之文無傳蓋義之附於經者內也義之徵於文者外也由內及外而發揮天人之際推闡制數之精其所藴更宏其所就更大惜乎編修之不究其用而遽沒也編修所著書元為刊其周易虞氏義虞氏消息儀禮圖今其友李生甫張雲藻又為刊其編年文集為四卷而屬序於元因闡編修之素所持論俾後之學為文者決擇焉若其文之不遁於虛無不溺於華藻不傷於支離則又知言者所其喻也嘉慶十四年夏阮元序茗柯文初編目録
